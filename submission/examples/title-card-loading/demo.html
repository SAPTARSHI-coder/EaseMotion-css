<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — title card loading</title>
  
  <link rel="stylesheet" href="./style.css">
</head>

<body>
<div class="scene" id="scene">

  <div class="word-row" id="word-row" aria-label="easeMotion-css">

    <span class="char" style="animation-delay: 0.08s">e</span>
    <span class="char" style="animation-delay: 0.14s">a</span>
    <span class="char" style="animation-delay: 0.20s">s</span>
    <span class="char" style="animation-delay: 0.26s">e</span>

    <span class="tri-up" style="animation-delay: 0.36s" aria-hidden="true"></span>
    <span class="tri-up" style="animation-delay: 0.36s" aria-hidden="true"></span>
      
    <span class="char" style="animation-delay: 0.46s">o</span>
    <span class="char" style="animation-delay: 0.52s">t</span>
    <span class="char" style="animation-delay: 0.58s">i</span>
    <span class="char" style="animation-delay: 0.64s">o</span>
    <span class="char" style="animation-delay: 0.70s">n</span>

    <span class="dash-sep" style="animation-delay: 0.82s" aria-hidden="true"></span>

    <span class="char" style="animation-delay: 0.92s">c</span>
    <span class="char" style="animation-delay: 0.98s">s</span>
    <span class="char" style="animation-delay: 1.04s">s</span>

  </div>

  <button class="replay-btn" id="replay-btn" onclick="replay()">↺ Replay</button>
</div>

<script>
  setTimeout(() => {
    document.getElementById('replay-btn').classList.add('visible');
  }, 2200);

  function replay() {
    const scene = document.getElementById('scene');
    const btn = document.getElementById('replay-btn');
    btn.classList.remove('visible');
    const row = document.getElementById('word-row');
    const clone = row.cloneNode(true);
    row.querySelectorAll('[style*="animation-delay"]').forEach(el => {
      el.style.animation = 'none';
      el.style.opacity = '0';
    });
    setTimeout(() => {
      const all = row.querySelectorAll('.char, .tri-up, .dot-o, .dash-sep');
      all.forEach(el => {
        const delay = el.style.animationDelay || el.getAttribute('data-delay') || '0s';
        el.style.animation = 'none';
        el.getBoundingClientRect();
        if (el.classList.contains('char')) {
          el.style.opacity = '0';
          el.style.transform = 'translateX(18px)';
          el.style.animation = `charIn 0.35s cubic-bezier(0.22,1,0.36,1) ${delay} forwards`;
        } else if (el.classList.contains('tri-up') || el.classList.contains('dot-o')) {
          el.style.opacity = '0';
          el.style.transform = 'scale(0.2) translateY(6px)';
          el.style.animation = `shapePopUp 0.45s cubic-bezier(0.34,1.56,0.64,1) ${delay} forwards`;
        } else if (el.classList.contains('dash-sep')) {
          el.style.opacity = '0';
          el.style.transform = 'scaleX(0)';
          el.style.animation = `dashIn 0.3s cubic-bezier(0.22,1,0.36,1) ${delay} forwards`;
        }
      });
      setTimeout(() => btn.classList.add('visible'), 1800);
    }, 50);
  }
</script>

</body>
</html>
