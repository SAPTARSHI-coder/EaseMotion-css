name: Track Repo Stats
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and Append Stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/${{ github.repository }})
          stars=$(echo $response | jq '.stargazers_count')
          forks=$(echo $response | jq '.forks_count')
          date=$(date +%Y-%m-%d)
          echo "$(jq ". += [{"date": "$date", "stars": $stars, "forks": $forks}]" submissions/examples/ease-star-tracking-20505/history.json)" > submissions/examples/ease-star-tracking-20505/history.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add submissions/examples/ease-star-tracking-20505/history.json
          git commit -m "chore: auto-update repo stats for $date"
          git push
