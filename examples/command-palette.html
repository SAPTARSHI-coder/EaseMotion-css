<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Command Palette Demo</title>
  <link rel="stylesheet" href="../easemotion.css">
  <style>
    body {
      background-color: var(--ease-color-bg);
      font-family: var(--ease-font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .demo-trigger {
      padding: 1rem 2rem;
    }
  </style>
</head>
<body>

  <button class="ease-btn ease-btn-primary demo-trigger" onclick="togglePalette()">
    Press <kbd class="ease-command-palette-kbd">Ctrl</kbd> + <kbd class="ease-command-palette-kbd">K</kbd> to open
  </button>

  <div id="palette-overlay" class="ease-command-palette-overlay" style="display: none;" onclick="closePalette(event)">
    <div class="ease-command-palette" onclick="event.stopPropagation()">
      <div class="ease-command-palette-header">
        <svg class="ease-command-palette-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input type="text" class="ease-command-palette-search" placeholder="Type a command or search..." autofocus>
      </div>
      
      <div class="ease-command-palette-content">
        <div class="ease-command-palette-group-label">Suggestions</div>
        
        <a href="#" class="ease-command-palette-item">
          <svg class="ease-command-palette-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          <span class="ease-command-palette-item-label">Go to Dashboard</span>
          <div class="ease-command-palette-item-shortcut">
            <kbd class="ease-command-palette-kbd">G</kbd>
            <kbd class="ease-command-palette-kbd">D</kbd>
          </div>
        </a>

        <a href="#" class="ease-command-palette-item">
          <svg class="ease-command-palette-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
          </svg>
          <span class="ease-command-palette-item-label">Settings</span>
          <div class="ease-command-palette-item-shortcut">
            <kbd class="ease-command-palette-kbd">S</kbd>
          </div>
        </a>

        <div class="ease-command-palette-group-label">Theme</div>

        <button class="ease-command-palette-item" onclick="setTheme('light')">
          <svg class="ease-command-palette-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 18v1m9-11h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.657 6.343l.707.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path>
          </svg>
          <span class="ease-command-palette-item-label">Switch to Light Mode</span>
        </button>

        <button class="ease-command-palette-item" onclick="setTheme('dark')">
          <svg class="ease-command-palette-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
          <span class="ease-command-palette-item-label">Switch to Dark Mode</span>
        </button>
      </div>

      <div class="ease-command-palette-footer">
        <span><kbd class="ease-command-palette-kbd">↑↓</kbd> to navigate</span>
        <span><kbd class="ease-command-palette-kbd">Enter</kbd> to select</span>
        <span><kbd class="ease-command-palette-kbd">Esc</kbd> to close</span>
      </div>
    </div>
  </div>

  <script>
    function togglePalette() {
      const overlay = document.getElementById('palette-overlay');
      overlay.style.display = overlay.style.display === 'none' ? 'flex' : 'none';
      if (overlay.style.display === 'flex') {
        overlay.querySelector('input').focus();
      }
    }

    function closePalette(e) {
      document.getElementById('palette-overlay').style.display = 'none';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      closePalette();
    }

    window.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        togglePalette();
      }
      if (e.key === 'Escape') {
        closePalette();
      }
    });
  </script>
</body>
</html>
