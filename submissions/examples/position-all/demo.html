<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position All Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item top-auto">.top-auto</div>
  <div class="demo-item top-0">.top-0</div>
  <div class="demo-item top-px">.top-px</div>
  <div class="demo-item top-1">.top-1</div>
  <div class="demo-item top-2">.top-2</div>
  <div class="demo-item top-4">.top-4</div>
</body>
</html>
