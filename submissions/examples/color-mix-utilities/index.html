<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Color Mix Utilities — EaseMotion CSS</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap");
body { font-family: "Manrope", system-ui, sans-serif; background: #f8fafc; padding: 2.5rem; margin: 0; }
h2 { color: hsl(243,60%,38%); font-size: 20px; margin-bottom: 1.75rem; font-weight: 700; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1.75rem; margin-top: 1rem; }
.card { padding: 2rem; color: white; border-radius: 25px; text-align: center; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
</style>
</head>
<body>
<h2>Color Mix Utilities — Card Utilities</h2>
<div class="grid">
  <div class="card" style="background:hsl(243,75%,60%)">Color Mix Utilities Primary</div>
  <div class="card" style="background:hsl(268,70%,52%)">Color Mix Utilities Secondary</div>
  <div class="card" style="background:linear-gradient(135deg, hsl(243,75%,60%), hsl(268,70%,52%))">Color Mix Utilities Featured</div>
  <div class="card" style="background:hsl(228,85%,65%)">Color Mix Utilities Accent</div>
  <div class="card" style="background:transparent;border:2px solid hsl(243,75%,60%);color:hsl(243,75%,60%)">Color Mix Utilities Ghost</div>
  <div class="card" style="background:hsl(243,75%,60%);opacity:0.82">Color Mix Utilities Muted</div>
</div>
</body>
</html>
