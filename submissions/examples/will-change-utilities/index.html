<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Will Change Utilities — EaseMotion CSS</title>
<style>
body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 2rem; margin: 0; }
h2 { color: hsl(276,42%,38%); margin-bottom: 1.5rem; font-size: 26px; }
.gd { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.5rem; }
.cell { background: hsl(276,57%,60%); color: white; border-radius: 9px; padding: 2rem; text-align: center; font-weight: 700; font-size: 1.1rem; }
</style>
</head>
<body>
<h2>Will Change Utilities — Grid Utilities</h2>
<div class="gd">
  <div class="cell">Will Change Utilities 1</div>
  <div class="cell" style="background:hsl(301,52%,52%)">Will Change Utilities 2</div>
  <div class="cell" style="background:linear-gradient(135deg, hsl(276,57%,60%), hsl(301,52%,52%))">Will Change Utilities 3</div>
  <div class="cell" style="background:hsl(261,67%,65%)">Will Change Utilities 4</div>
  <div class="cell" style="background:hsl(276,57%,60%);opacity:0.85">Will Change Utilities 5</div>
  <div class="cell" style="background:hsl(276,42%,38%)">Will Change Utilities 6</div>
</div>
</body>
</html>
