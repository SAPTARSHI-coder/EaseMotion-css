<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>List Style Image — EaseMotion CSS</title>
<style>
body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 2rem; margin: 0; }
h2 { color: hsl(278,50%,38%); margin-bottom: 1.5rem; font-size: 28px; }
.gd { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.5rem; }
.cell { background: hsl(278,65%,60%); color: white; border-radius: 10px; padding: 2rem; text-align: center; font-weight: 700; font-size: 1.1rem; }
</style>
</head>
<body>
<h2>List Style Image — Grid Utilities</h2>
<div class="gd">
  <div class="cell">List Style Image 1</div>
  <div class="cell" style="background:hsl(303,60%,52%)">List Style Image 2</div>
  <div class="cell" style="background:linear-gradient(135deg, hsl(278,65%,60%), hsl(303,60%,52%))">List Style Image 3</div>
  <div class="cell" style="background:hsl(263,75%,65%)">List Style Image 4</div>
  <div class="cell" style="background:hsl(278,65%,60%);opacity:0.85">List Style Image 5</div>
  <div class="cell" style="background:hsl(278,50%,38%)">List Style Image 6</div>
</div>
</body>
</html>
