<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Statistics Counter Layout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="stats-section">

<h1>Our Achievements</h1>

<div class="stats-grid">

<div class="stat-card">
<div class="circle circle-90">
<span>90%</span>
</div>
<h2>Customer Satisfaction</h2>

<div class="progress">
<div class="bar w90"></div>
</div>

</div>

<div class="stat-card">

<div class="circle circle-75">
<span>75%</span>
</div>

<h2>Projects Completed</h2>

<div class="progress">
<div class="bar w75"></div>
</div>

</div>

<div class="stat-card">

<div class="circle circle-65">
<span>65%</span>
</div>

<h2>Growth Rate</h2>

<div class="progress">
<div class="bar w65"></div>
</div>

</div>

</div>

</section>

</body>
</html>
