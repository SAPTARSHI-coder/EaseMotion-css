<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>animated-stat-card-sk · EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="dashboard">
    <div class="card card--revenue">
      <span class="card-icon">&#128178;</span>
      <span class="card-value" data-target="48250">0</span>
      <span class="card-label">Revenue</span>
      <span class="card-trend up">+12.5%</span>
    </div>

    <div class="card card--users">
      <span class="card-icon">&#128101;</span>
      <span class="card-value" data-target="12840">0</span>
      <span class="card-label">Active Users</span>
      <span class="card-trend up">+8.2%</span>
    </div>

    <div class="card card--orders">
      <span class="card-icon">&#128722;</span>
      <span class="card-value" data-target="3620">0</span>
      <span class="card-label">Orders</span>
      <span class="card-trend down">-3.1%</span>
    </div>

    <div class="card card--conversion">
      <span class="card-icon">&#128200;</span>
      <span class="card-value" data-target="3.42">0</span>
      <span class="card-label">Conversion %</span>
      <span class="card-trend up">+0.8%</span>
    </div>
  </div>

</body>
</html>
