<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aspect Ratio Utilities — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 4rem 1rem; margin: 0;">

  <div style="max-width: 1000px; margin: 0 auto 2rem auto; text-align: center; font-family: sans-serif;">
    <h2 style="margin: 0 0 0.5rem 0; font-size: 1.5rem; font-weight: 800; color: #0f172a;">Responsive Dimension Containers</h2>
    <p style="margin: 0; color: #64748b; font-size: 0.95rem;">Resize the window to view native aspect box layouts adapt instantly.</p>
  </div>

  <div class="ease-ratio-workspace">
    
    <div class="ease-ratio-box">
      <div class="ease-ratio-preview-canvas ease-aspect-video">
        <span style="font-weight: 800; color: #475569;">16 : 9</span>
      </div>
      <div class="ease-ratio-meta">
        <p class="ease-ratio-title">.ease-aspect-video</p>
      </div>
    </div>

    <div class="ease-ratio-box">
      <div class="ease-ratio-preview-canvas ease-aspect-square">
        <span style="font-weight: 800; color: #475569;">1 : 1</span>
      </div>
      <div class="ease-ratio-meta">
        <p class="ease-ratio-title">.ease-aspect-square</p>
      </div>
    </div>

    <div class="ease-ratio-box">
      <div class="ease-ratio-preview-canvas ease-aspect-standard">
        <span style="font-weight: 800; color: #475569;">4 : 3</span>
      </div>
      <div class="ease-ratio-meta">
        <p class="ease-ratio-title">.ease-aspect-standard</p>
      </div>
    </div>

    <div class="ease-ratio-box">
      <div class="ease-ratio-preview-canvas ease-aspect-cinema">
        <span style="font-weight: 800; color: #475569;">21 : 9</span>
      </div>
      <div class="ease-ratio-meta">
        <p class="ease-ratio-title">.ease-aspect-cinema</p>
      </div>
    </div>

  </div>

</body>
</html>
