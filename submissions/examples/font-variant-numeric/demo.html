<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>font-variant-numeric - EaseMotion</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: system-ui, sans-serif; background: #fff; padding: 2rem; max-width: 700px; margin: 0 auto; }h2 { color: #6c63ff; border-bottom: 2px solid #6c63ff; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }ul { list-style: none; padding: 0; margin: 0; }

  <li class="font-variant-numeric-item font-variant-numeric-item-hov">Font Variant Numeric item five <span class="font-variant-numeric-tag">stable</span></li>
