<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ease Accordion Slide Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#f3f4f6; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div style="width:350px; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
        <div class="ease-accordion-item">
            <div style="padding:15px; background:#e2e8f0; font-weight:600; cursor:pointer;">Click to Expand</div>
            <div class="ease-accordion-slide-pr">
                <p style="margin:0; padding:15px; color:#4a5568;">This accordion content slides out smoothly using transitions on max-height combined with overflow controls.</p>
            </div>
        </div>
    </div>
</body>
</html>
