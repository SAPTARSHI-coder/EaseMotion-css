<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appearance-None Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 60px 20px; margin: 0;">

  <div class="ui-interaction-card">
    <h5>Appearance-None Utility Showcase</h5>
    <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-bottom: 1.5rem;">
      Compare browser-native controls (which cannot be styled reliably) to elements with <code>.ease-appearance-none</code> applied, allowing for beautiful, custom designs.
    </p>

    <!-- Custom/Appearance-None Row -->
    <div class="interactive-action-row">
      <div class="control-box">
        <label>Custom Styled Select</label>
        <div class="select-container">
          <select class="ease-appearance-none custom-select">
            <option>Option 1</option>
            <option>Option 2</option>
            <option>Option 3</option>
          </select>
          <div class="custom-select-arrow">▼</div>
        </div>
      </div>
    </div>

    <!-- Standard/Browser Default Row -->
    <div class="interactive-action-row">
      <div class="control-box">
        <label>Standard Browser Select</label>
        <select class="standard-select">
          <option>Option 1</option>
          <option>Option 2</option>
          <option>Option 3</option>
        </select>
      </div>
    </div>
  </div>

</body>
</html>
