<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight Hover Card — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Spotlight Hover Card</h1>

    <p class="subtitle">
        Move your cursor over any card to reveal an interactive spotlight.
    </p>

    <div class="cards">

        <div class="spotlight-card">
            <h3>Analytics</h3>
            <p>Track your performance in real time.</p>
        </div>

        <div class="spotlight-card">
            <h3>Security</h3>
            <p>Enterprise-grade protection for your data.</p>
        </div>

        <div class="spotlight-card">
            <h3>Automation</h3>
            <p>Save time with smart workflows.</p>
        </div>

    </div>

</div>

<script>
const cards = document.querySelectorAll(".spotlight-card");

cards.forEach(card => {
    card.addEventListener("mousemove", e => {
        const rect = card.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        card.style.setProperty("--x", `${x}px`);
        card.style.setProperty("--y", `${y}px`);
    });
});
</script>

</body>
</html>
