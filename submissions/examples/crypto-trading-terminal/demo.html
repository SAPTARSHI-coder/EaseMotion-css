<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Trading Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <div class="watchlist">
    <h2>Market Watch</h2>

    <div class="asset">
      <strong>BTC</strong>
      <span class="up">+2.4%</span>
    </div>

    <div class="asset">
      <strong>ETH</strong>
      <span class="down">-1.2%</span>
    </div>
  </div>

  <div class="chart">
    <h2>Trading Chart</h2>
    <div class="chart-box"></div>
  </div>

  <div class="portfolio">
    <h2>Portfolio</h2>
    <p>Balance: $12,450</p>

    <button class="buy">Buy</button>
    <button class="sell">Sell</button>
  </div>

</div>

</body>
</html>
