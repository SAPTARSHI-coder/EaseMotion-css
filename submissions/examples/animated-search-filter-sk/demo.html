<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Search &amp; Filter | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="search__heading">Search &amp; Filter</h1>
  <div class="search__wrapper">

    <div class="search">
      <label for="search-input" class="search__icon">🔍</label>
      <input id="search-input" class="search__input" type="text" placeholder="Search..." />

      <div class="search__filter-wrapper">
        <input type="checkbox" id="filter-toggle" class="search__filter-toggle" hidden />
        <label for="filter-toggle" class="search__filter-btn">⚙</label>
        <div class="search__dropdown">
          <label class="search__option">
            <input type="checkbox" checked /> Documentation
          </label>
          <label class="search__option">
            <input type="checkbox" checked /> Components
          </label>
          <label class="search__option">
            <input type="checkbox" /> Examples
          </label>
          <label class="search__option">
            <input type="checkbox" /> Tutorials
          </label>
          <label class="search__option">
            <input type="checkbox" /> Blog
          </label>
        </div>
      </div>
    </div>

  </div>

  <p class="search__footnote">Click the search icon to expand · Toggle ⚙ for filter options</p>
</body>
</html>
