<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Explicit Button Type Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-wrapper">
    <h2>Form Submission vs Standard Button Showcase</h2>
    <p>This layout demonstrates form-safe buttons utilizing explicit typing attributes to prevent unexpected page reloads.</p>
    
    <form class="sample-form" onsubmit="alert('Form Submitted!'); return false;">
      <!-- Explicitly typed standard buttons -->
      <button type="button" class="ease-btn ease-btn-primary">Safe Button (Type="button")</button>
      <button type="button" class="ease-btn ease-btn-secondary">Secondary Safe Button</button>
      
      <!-- Actual submission button -->
      <button type="submit" class="ease-btn ease-btn-submit">Submit Form</button>
    </form>
  </main>
</body>
</html>
