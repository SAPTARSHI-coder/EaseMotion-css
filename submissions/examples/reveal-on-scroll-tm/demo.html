<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reveal on Scroll</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Scroll to Reveal</h1>
    <div class="ease-reveal">Item 1 (appears on scroll)</div>
    <div class="ease-reveal">Item 2 (appears on scroll)</div>
    <div class="ease-reveal">Item 3 (appears on scroll)</div>
  </div>
  <script>
    const io = new IntersectionObserver(entries => entries.forEach(e => e.isIntersecting && e.target.classList.add('ease-reveal-visible')));
    document.querySelectorAll('.ease-reveal').forEach(el => io.observe(el));
  </script>
</body>
</html>
