<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Magnetic Pull - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1 class="demo-title">Button Magnetic Pull</h1>
      <p class="demo-subtitle">
        Buttons respond to the gravitational pull of nearby cursor movement,
        creating tactile physical layouts.
      </p>

      <!-- Playground area -->
      <div class="playground-card">
        <div class="button-container">
          <!-- Primary Magnetic Button -->
          <button class="btn-magnetic btn-magnetic-primary">
            <span class="btn-text">Indigo Gravitational</span>
          </button>

          <!-- Emerald Success Magnetic Button -->
          <button class="btn-magnetic btn-magnetic-emerald">
            <span class="btn-text">Emerald Pull</span>
          </button>

          <!-- Ghost Outline Magnetic Button -->
          <button class="btn-magnetic btn-magnetic-ghost">
            <span class="btn-text">Ghost Attraction</span>
          </button>
        </div>

        <p class="magnetic-instruction">
          Move your cursor close to any button to see the pull effect
        </p>
      </div>
    </div>

    <!-- Magnetic Tracking Javascript -->
    <script>
      const magneticButtons = document.querySelectorAll(".btn-magnetic");

      window.addEventListener("mousemove", (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        magneticButtons.forEach((btn) => {
          const rect = btn.getBoundingClientRect();

          // Find center coordinates of the button
          const buttonCenterX = rect.left + rect.width / 2;
          const buttonCenterY = rect.top + rect.height / 2;

          // Calculate distance from cursor to button center
          const distanceX = mouseX - buttonCenterX;
          const distanceY = mouseY - buttonCenterY;
          const distance = Math.hypot(distanceX, distanceY);

          const proximityThreshold = 140; // Pixels distance to start magnetic pull

          if (distance < proximityThreshold) {
            btn.classList.add("is-magnetic");

            // Compute interpolation factor for progressive pull
            // The closer the cursor, the stronger the pull strength
            const pullStrength = 0.35;
            const targetX = distanceX * pullStrength;
            const targetY = distanceY * pullStrength;

            btn.style.setProperty("--x", `${targetX}px`);
            btn.style.setProperty("--y", `${targetY}px`);
          } else {
            btn.classList.remove("is-magnetic");
            btn.style.setProperty("--x", "0px");
            btn.style.setProperty("--y", "0px");
          }
        });
      });
    </script>
  </body>
</html>
