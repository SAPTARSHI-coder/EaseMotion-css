<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only Animated Camera Shutter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="camera-container">
        <div class="camera-body">
            <div class="lens-outer">
                <div class="lens-inner">
                    <div class="aperture">
                        <div class="shutter-blade"></div>
                        <div class="shutter-blade"></div>
                        <div class="shutter-blade"></div>
                        <div class="shutter-blade"></div>
                        <div class="shutter-blade"></div>
                        <div class="shutter-blade"></div>
                    </div>
                    <div class="lens-glass"></div>
                </div>
            </div>
            <div class="flash"></div>
        </div>
        <p class="instruction">Hover over the camera</p>
    </div>
</body>
</html>
