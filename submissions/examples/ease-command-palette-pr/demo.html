<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-command-palette - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-command-overlay">
    <div class="ease-command-palette">
      <div class="command-search">
        <input type="text" placeholder="Search commands..." autofocus>
      </div>
      <div class="command-list">
        <div class="command-group">
          <h4>Navigation</h4>
          <div class="command-item active" tabindex="0">
            <span>Go to Dashboard</span><kbd>⌘D</kbd>
          </div>
          <div class="command-item" tabindex="0">
            <span>Open Settings</span><kbd>⌘S</kbd>
          </div>
          <div class="command-item" tabindex="0">
            <span>View Profile</span><kbd>⌘P</kbd>
          </div>
        </div>
        <div class="command-group">
          <h4>Actions</h4>
          <div class="command-item" tabindex="0">
            <span>Create New Project</span><kbd>⌘N</kbd>
          </div>
          <div class="command-item" tabindex="0">
            <span>Toggle Dark Mode</span><kbd>⌘T</kbd>
          </div>
          <div class="command-item" tabindex="0">
            <span>Keyboard Shortcuts</span><kbd>⌘/</kbd>
          </div>
        </div>
      </div>
      <div class="command-footer">
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>↵</kbd> select</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>
  </div>
</body>
</html>
