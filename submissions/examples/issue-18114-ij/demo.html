<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-parallax-scroll - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Parallax Scroll</h1>
    <div class="parallax-stage" id="parallaxStage">
      <div class="parallax-scene">
        <div class="parallax-layer parallax-bg" id="bgLayer">EaseMotion</div>
        <div class="parallax-layer parallax-mid" id="midLayer">Parallax Depth</div>
        <div class="parallax-layer parallax-fg" id="fgLayer">
          <span>Scroll inside this box</span>
          <span style="font-size:0.85rem;opacity:0.6;">Layers move at different speeds</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    const stage = document.getElementById('parallaxStage');
    const bg = document.getElementById('bgLayer');
    const mid = document.getElementById('midLayer');
    const fg = document.getElementById('fgLayer');
    stage.addEventListener('scroll', () => {
      const s = stage.scrollTop;
      bg.style.transform = 'translateY(' + (s * 0.3) + 'px)';
      mid.style.transform = 'translateY(' + (s * 0.6) + 'px)';
      fg.style.transform = 'translateY(' + (s * 0.9) + 'px)';
    });
  </script>
</body>
</html>
