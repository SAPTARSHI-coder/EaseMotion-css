<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>animated-modal-dialog-sk · EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a href="#demo-modal" class="open-btn">Open Modal</a>

  <div id="demo-modal" class="modal">
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Dialog Title</h2>
          <a href="#" class="modal-close">&times;</a>
        </div>
        <div class="modal-body">
          <p>This modal is powered entirely by the <code>:target</code> pseudo-class — no JavaScript needed.</p>
          <p>The overlay backdrop uses a blur effect, and the dialog slides in smoothly from below. Click the backdrop, the close button, or press a close link to dismiss.</p>
        </div>
        <div class="modal-footer">
          <a href="#" class="btn-close">Close</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
