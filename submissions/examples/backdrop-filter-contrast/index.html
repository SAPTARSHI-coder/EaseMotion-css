<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backdrop Filter Contrast — EaseMotion CSS</title>
<style>
body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 2rem; margin: 0; }
h2 { color: hsl(265,70%,38%); margin-bottom: 1.5rem; font-size: 20px; }
.gd { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.5rem; }
.cell { background: hsl(265,85%,60%); color: white; border-radius: 11px; padding: 2rem; text-align: center; font-weight: 700; font-size: 1.1rem; }
</style>
</head>
<body>
<h2>Backdrop Filter Contrast — Grid Utilities</h2>
<div class="gd">
  <div class="cell">Backdrop Filter Contrast 1</div>
  <div class="cell" style="background:hsl(290,80%,52%)">Backdrop Filter Contrast 2</div>
  <div class="cell" style="background:linear-gradient(135deg, hsl(265,85%,60%), hsl(290,80%,52%))">Backdrop Filter Contrast 3</div>
  <div class="cell" style="background:hsl(250,95%,65%)">Backdrop Filter Contrast 4</div>
  <div class="cell" style="background:hsl(265,85%,60%);opacity:0.85">Backdrop Filter Contrast 5</div>
  <div class="cell" style="background:hsl(265,70%,38%)">Backdrop Filter Contrast 6</div>
</div>
</body>
</html>
