<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Action Menu</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <p>Click the + button in the bottom right</p>
    <div class="ease-fab" id="fab">
      <button class="ease-fab-trigger" onclick="document.getElementById('fab').classList.toggle('ease-fab-open')">+</button>
      <div class="ease-fab-menu">
        <button>New file</button>
        <button>Upload</button>
        <button>Share</button>
      </div>
    </div>
  </div>
</body>
</html>
