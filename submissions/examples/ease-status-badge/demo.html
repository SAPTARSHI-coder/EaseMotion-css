<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Badge - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Status Badge</h1>
      <p>Animated status indicators representing user availability states.</p>
    </header>

    <main class="demo-grid">
      <!-- Standard Statuses -->
      <section class="demo-card">
        <h2>Component States</h2>
        <div class="flex-column">
          
          <div class="user-row">
            <div class="avatar">
              <div class="ease-status-badge ease-status-online"></div>
            </div>
            <div class="user-info">
              <span class="user-name">Sarah Jenkins</span>
              <span class="user-status-text">Online (Gentle Ping)</span>
            </div>
          </div>

          <div class="user-row">
            <div class="avatar">
              <div class="ease-status-badge ease-status-away"></div>
            </div>
            <div class="user-info">
              <span class="user-name">Michael Chen</span>
              <span class="user-status-text">Away (Slow Pulse)</span>
            </div>
          </div>

          <div class="user-row">
            <div class="avatar">
              <div class="ease-status-badge ease-status-busy"></div>
            </div>
            <div class="user-info">
              <span class="user-name">David Rodriguez</span>
              <span class="user-status-text">Do Not Disturb (Fast Pulse)</span>
            </div>
          </div>

          <div class="user-row">
            <div class="avatar">
              <div class="ease-status-badge ease-status-offline"></div>
            </div>
            <div class="user-info">
              <span class="user-name">Emma Watson</span>
              <span class="user-status-text">Offline (Static)</span>
            </div>
          </div>

        </div>
      </section>

      <!-- Interactive Playground -->
      <section class="demo-card interactive-section">
        <h2>Interactive Demo</h2>
        <div class="interactive-container">
          
          <div class="preview-box">
            <span class="ease-status-badge ease-status-online" id="interactive-badge" style="--ease-status-size: 24px;"></span>
          </div>
          
          <div class="controls">
            <label for="status-select">Change Status:</label>
            <select id="status-select">
              <option value="ease-status-online">Online</option>
              <option value="ease-status-away">Away</option>
              <option value="ease-status-busy">Busy (Do Not Disturb)</option>
              <option value="ease-status-offline">Offline</option>
            </select>
          </div>

        </div>
      </section>
    </main>
  </div>

  <script>
    // Interactive logic to swap classes dynamically
    const statusSelect = document.getElementById('status-select');
    const interactiveBadge = document.getElementById('interactive-badge');

    statusSelect.addEventListener('change', (e) => {
      // Remove all previous status classes
      interactiveBadge.classList.remove(
        'ease-status-online', 
        'ease-status-away', 
        'ease-status-busy', 
        'ease-status-offline'
      );
      // Add the selected status class
      interactiveBadge.classList.add(e.target.value);
    });
  </script>
</body>
</html>
