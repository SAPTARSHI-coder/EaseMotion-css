<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Island Morphing Pill Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 2rem;
      gap: 1rem;
    }

    p {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      margin: 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <p>Click the pill to expand ↓</p>

  <div class="ease-dynamic-island">
    <input type="checkbox" id="island-toggle" class="island-toggle-hack" />

    <label for="island-toggle" class="island-morph-container">

      <!-- Compact State -->
      <div class="island-compact-state">
        <span>🔔 Notification</span>
      </div>

      <!-- Expanded State -->
      <div class="island-expanded-state">
        <p class="island-title">Incoming Call</p>
        <p class="island-subtitle">John Doe • Mobile</p>
        <div class="island-actions">
          <button class="island-btn accept">Accept</button>
          <button class="island-btn decline">Decline</button>
        </div>
      </div>

    </label>
  </div>

</body>
</html>
