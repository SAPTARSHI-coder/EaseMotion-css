<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Toggle Switch</title>
  <meta name="description" content="CSS-only animated toggle switch component with size variants, checked/unchecked states, and disabled support.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Animated Toggle Switch</h1>
      <p class="subtitle">CSS-only toggle with smooth knob animation, size variants, and disabled state</p>
    </header>

    <div class="toggle-showcase">

      <div class="toggle-group">
        <span class="toggle-label">Default (sm)</span>
        <label class="ease-toggle ease-toggle-sm">
          <input type="checkbox" class="ease-toggle-input" checked>
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
        <label class="ease-toggle ease-toggle-sm">
          <input type="checkbox" class="ease-toggle-input">
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
      </div>

      <div class="toggle-group">
        <span class="toggle-label">Default (md)</span>
        <label class="ease-toggle">
          <input type="checkbox" class="ease-toggle-input" checked>
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
        <label class="ease-toggle">
          <input type="checkbox" class="ease-toggle-input">
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
      </div>

      <div class="toggle-group">
        <span class="toggle-label">Default (lg)</span>
        <label class="ease-toggle ease-toggle-lg">
          <input type="checkbox" class="ease-toggle-input" checked>
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
        <label class="ease-toggle ease-toggle-lg">
          <input type="checkbox" class="ease-toggle-input">
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
      </div>

      <div class="toggle-group">
        <span class="toggle-label">Disabled</span>
        <label class="ease-toggle disabled">
          <input type="checkbox" class="ease-toggle-input" checked disabled>
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
        <label class="ease-toggle disabled">
          <input type="checkbox" class="ease-toggle-input" disabled>
          <span class="ease-toggle-track">
            <span class="ease-toggle-thumb"></span>
          </span>
        </label>
      </div>

    </div>
  </main>

</body>
</html>
