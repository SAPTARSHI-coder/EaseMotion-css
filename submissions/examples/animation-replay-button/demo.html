<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Replay Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Animation Replay Demo</h1>

  <div id="animationBox" class="box animate">
    EaseMotion
  </div>

  <button id="replayBtn" type="button">
    Replay Animation
  </button>

  <p id="status" class="visually-hidden" role="status" aria-live="polite"></p>
</div>

<script>
  const box = document.getElementById("animationBox");
  const replayBtn = document.getElementById("replayBtn");
  const status = document.getElementById("status");

  function replayAnimation() {
    // Prevent a second click from interrupting an animation in progress
    replayBtn.disabled = true;

    box.classList.remove("animate");

    // Force the browser to acknowledge the class removal
    // before adding it back, otherwise the animation won't restart
    void box.offsetWidth;

    box.classList.add("animate");
    status.textContent = "Animation replayed";
  }

  box.addEventListener("animationend", () => {
    replayBtn.disabled = false;
  });

  replayBtn.addEventListener("click", replayAnimation);
</script>

</body>
</html>
