<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Card Focus — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ripple Card Focus</h1>

    <p class="subtitle">
        Click any card to create a ripple focus effect.
    </p>

    <div class="card-grid">

        <div class="ripple-card">
            <h3>Starter</h3>
            <p>Perfect for beginners.</p>
        </div>

        <div class="ripple-card">
            <h3>Pro</h3>
            <p>Advanced tools and analytics.</p>
        </div>

        <div class="ripple-card">
            <h3>Enterprise</h3>
            <p>Built for large teams.</p>
        </div>

    </div>

</div>

<script>
const cards = document.querySelectorAll(".ripple-card");

cards.forEach(card => {
    card.addEventListener("click", () => {
        card.classList.remove("active");

        void card.offsetWidth;

        card.classList.add("active");
    });
});
</script>

</body>
</html>
