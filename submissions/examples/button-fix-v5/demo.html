<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Demo Button Sizing Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .btn-before {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            margin: 1rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
        }
        .btn-after {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            margin: 1rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            min-height: 48px;
        }
        .section {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔘 Live Demo Button Sizing Fix</h1>
        <p>Before & After comparison</p>
        <div class="section">
            <h2>❌ Before (Cramped)</h2>
            <button class="btn-before">Live Demo →</button>
            <p>Text is cramped, little padding</p>
        </div>
        <div class="section">
            <h2>✅ After (Fixed)</h2>
            <button class="btn-after">Live Demo →</button>
            <p>Proper padding, comfortable to read and click</p>
        </div>
        <div class="success">
            ✅ <strong>Fix applied:</strong> Increased vertical padding, font size, and min-height.
        </div>
    </div>
</body>
</html>
