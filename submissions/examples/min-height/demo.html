<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min Height Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item min-h-0">.min-h-0</div>
  <div class="demo-item min-h-full">.min-h-full</div>
  <div class="demo-item min-h-screen">.min-h-screen</div>
  <div class="demo-item min-h-min">.min-h-min</div>
  <div class="demo-item min-h-max">.min-h-max</div>
  <div class="demo-item min-h-fit">.min-h-fit</div>
</body>
</html>
