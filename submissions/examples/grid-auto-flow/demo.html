<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>grid-auto-flow - EaseMotion</title>
<link rel="stylesheet" href="style.css">
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");body { font-family: "Inter", system-ui, sans-serif; background: #f8fafc; padding: 2rem; margin: 0; }h2 { color: #1e293b; margin-bottom: 1.5rem; font-size: 1.5rem; }.demo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }.demo-card { padding: 2rem; color: white; text-align: center; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<h2>Grid Auto Flow Utilities</h2>
<div class="demo-grid">
  <div class="demo-card grid-auto-flow-card-pri">Grid Auto Flow Primary</div>
  <div class="demo-card grid-auto-flow-card-sec">Grid Auto Flow Secondary</div>
  <div class="demo-card grid-auto-flow-card-ghost">Grid Auto Flow Ghost</div>
  <div class="demo-card grid-auto-flow-card-glow">Grid Auto Flow Glow</div>
  <div class="demo-card grid-auto-flow-card-succ">Grid Auto Flow Success</div>
  <div class="demo-card grid-auto-flow-card-warn">Grid Auto Flow Warning</div>
</div>
</body>
</html>
