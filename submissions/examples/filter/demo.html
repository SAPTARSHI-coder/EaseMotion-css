<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item blur-0">.blur-0</div>
  <div class="demo-item blur-1">.blur-1</div>
  <div class="demo-item blur-2">.blur-2</div>
  <div class="demo-item blur-4">.blur-4</div>
  <div class="demo-item blur-8">.blur-8</div>
  <div class="demo-item blur-16">.blur-16</div>
</body>
</html>
