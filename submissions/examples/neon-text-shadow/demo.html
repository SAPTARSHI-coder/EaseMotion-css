<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Text Shadow · EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="demo">
    <h1 class="demo-title">Neon Text Shadow</h1>
    <p class="demo-subtitle">
      Layered <code>text-shadow</code> creates vivid neon glow effects without JavaScript.
    </p>

    <section class="showcase">
      <h2 class="neon-blue">Neon Blue</h2>
      <h2 class="neon-pink">Neon Pink</h2>
      <h2 class="neon-green">Neon Green</h2>
      <h2 class="neon-yellow">Neon Yellow</h2>
    </section>

    <section class="showcase row">
      <span class="neon-blue  label">Blue</span>
      <span class="neon-pink  label">Pink</span>
      <span class="neon-green label">Green</span>
      <span class="neon-yellow label">Yellow</span>
    </section>

    <section class="showcase">
      <h2 class="neon-blue  pulse">Pulse · Blue</h2>
      <h2 class="neon-pink  pulse">Pulse · Pink</h2>
      <h2 class="neon-green pulse">Pulse · Green</h2>
      <h2 class="neon-yellow pulse">Pulse · Yellow</h2>
    </section>

    <footer class="demo-footer">
      <p>Each neon color uses 3–5 layered text-shadows with matching animations.</p>
    </footer>
  </main>

</body>
</html>
