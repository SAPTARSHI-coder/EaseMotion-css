<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Justify Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item text-justify-auto">.text-justify-auto</div>
  <div class="demo-item text-justify-interword">.text-justify-interword</div>
  <div class="demo-item text-justify-intercharacter">.text-justify-intercharacter</div>
  <div class="demo-item text-justify-none">.text-justify-none</div>
  <div class="demo-item text-justify-distribute">.text-justify-distribute</div>
  <div class="demo-item text-justify-initial">.text-justify-initial</div>
</body>
</html>
