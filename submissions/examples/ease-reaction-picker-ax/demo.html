<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-reaction-picker – Emoji Reaction Picker</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Emoji Reaction Picker</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Hover over the message to pick a reaction. Selected emoji pops in.
    </p>

    <!-- Message bubble -->
    <div class="message-wrapper ease-relative ease-inline-block ease-mx-auto">
      <div class="message-bubble ease-card ease-p-4 ease-text-left ease-bg-white ease-cursor-pointer">
        <p class="ease-text-gray-800">Great work on the project! 🎉</p>
      </div>

      <!-- Reaction picker popover (hidden by default) -->
      <div class="reaction-popover ease-absolute ease-bottom-full ease-left-1/2 ease--translate-x-1/2 ease-mb-2">
        <div class="reaction-row ease-flex ease-gap-1 ease-bg-white ease-rounded-full ease-p-2 ease-shadow-lg ease-border ease-border-slate-200">
          <button class="reaction-emoji" data-emoji="👍">👍</button>
          <button class="reaction-emoji" data-emoji="❤️">❤️</button>
          <button class="reaction-emoji" data-emoji="😂">😂</button>
          <button class="reaction-emoji" data-emoji="😮">😮</button>
          <button class="reaction-emoji" data-emoji="😢">😢</button>
          <button class="reaction-emoji" data-emoji="🔥">🔥</button>
        </div>
      </div>

      <!-- Selected reaction display -->
      <div class="selected-reaction ease-mt-2 ease-flex ease-gap-2 ease-justify-center">
        <!-- dynamically filled by JS -->
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Stagger entrance on hover, emoji scales on hover, selection pops and closes popover.
    </p>
  </div>

  <script>
    const wrapper = document.querySelector('.message-wrapper');
    const popover = document.querySelector('.reaction-popover');
    const selectedContainer = document.querySelector('.selected-reaction');
    const emojiButtons = document.querySelectorAll('.reaction-emoji');
    let hideTimeout;

    function showPopover() {
      clearTimeout(hideTimeout);
      popover.classList.add('visible');
      // stagger each emoji button
      emojiButtons.forEach((btn, i) => {
        btn.style.animationDelay = ${i * 0.03}s;
        btn.classList.add('emoji-stagger');
      });
    }

    function hidePopover() {
      hideTimeout = setTimeout(() => {
        popover.classList.remove('visible');
        emojiButtons.forEach(btn => btn.classList.remove('emoji-stagger'));
      }, 150); // small delay to allow moving cursor into popover
    }

    wrapper.addEventListener('mouseenter', showPopover);
    wrapper.addEventListener('mouseleave', hidePopover);
    popover.addEventListener('mouseenter', () => clearTimeout(hideTimeout));
    popover.addEventListener('mouseleave', hidePopover);

    // Select reaction
    emojiButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const emoji = btn.dataset.emoji;
        // Add selected emoji to display with pop animation
        const chip = document.createElement('span');
        chip.className = 'reaction-chip ease-text-xl ease-fade-in';
        chip.textContent = emoji;
        chip.style.animation = 'emoji-pop 0.3s ease';
        selectedContainer.appendChild(chip);
        // Remove chip on click (toggle off)
        chip.addEventListener('click', () => {
          chip.remove();
        });
        // Hide popover
        popover.classList.remove('visible');
        emojiButtons.forEach(btn => btn.classList.remove('emoji-stagger'));
      });
    });
  </script>

</body>
</html>
