<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Glow Button</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>Neon Glow</h1>
      <p>Hover to activate glow</p>
    </header>

    <div class="btn-group">
      <button class="btn btn-indigo">Indigo</button>
      <button class="btn btn-pink">Pink</button>
      <button class="btn btn-teal">Teal</button>
      <button class="btn btn-amber">Amber</button>
      <button class="btn btn-indigo btn-throb">Throb</button>
      <button class="btn btn-pink btn-throb-pink">Throb Pink</button>
      <button class="btn btn-ghost">Ghost</button>
    </div>
  </body>
</html>
