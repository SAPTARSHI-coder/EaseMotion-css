<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pointer Events Utilities — EaseMotion CSS</title>
<style>
body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 2rem; margin: 0; }
h2 { color: hsl(249,42%,38%); margin-bottom: 1.5rem; font-size: 28px; }
.gd { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.5rem; }
.cell { background: hsl(249,57%,60%); color: white; border-radius: 12px; padding: 2rem; text-align: center; font-weight: 700; font-size: 1.1rem; }
</style>
</head>
<body>
<h2>Pointer Events Utilities — Grid Utilities</h2>
<div class="gd">
  <div class="cell">Pointer Events Utilities 1</div>
  <div class="cell" style="background:hsl(274,52%,52%)">Pointer Events Utilities 2</div>
  <div class="cell" style="background:linear-gradient(135deg, hsl(249,57%,60%), hsl(274,52%,52%))">Pointer Events Utilities 3</div>
  <div class="cell" style="background:hsl(234,67%,65%)">Pointer Events Utilities 4</div>
  <div class="cell" style="background:hsl(249,57%,60%);opacity:0.85">Pointer Events Utilities 5</div>
  <div class="cell" style="background:hsl(249,42%,38%)">Pointer Events Utilities 6</div>
</div>
</body>
</html>
