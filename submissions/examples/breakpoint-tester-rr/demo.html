<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Breakpoint Tester</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>📱 Responsive Breakpoint Tester</h1>
        <p>Visualize common responsive breakpoints used in modern web design.</p>
    </header>

    <section class="breakpoint-grid">

        <div class="breakpoint-card mobile">
            <div class="icon">📱</div>
            <h3>Mobile</h3>
            <p>&lt; 640px</p>
        </div>

        <div class="breakpoint-card tablet">
            <div class="icon">📟</div>
            <h3>Tablet</h3>
            <p>640px – 768px</p>
        </div>

        <div class="breakpoint-card laptop">
            <div class="icon">💻</div>
            <h3>Laptop</h3>
            <p>768px – 1024px</p>
        </div>

        <div class="breakpoint-card desktop">
            <div class="icon">🖥️</div>
            <h3>Desktop</h3>
            <p>1024px+</p>
        </div>

    </section>

    <section class="preview-section">
        <h2>Responsive Preview</h2>

        <div class="preview-layout">
            <div class="preview-box">Sidebar</div>
            <div class="preview-box">Content</div>
            <div class="preview-box">Widgets</div>
        </div>
    </section>

</div>

</body>
</html>
