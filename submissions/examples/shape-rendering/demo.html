<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Rendering Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item shape-auto">.shape-auto</div>
  <div class="demo-item shape-optimize-speed">.shape-optimize-speed</div>
  <div class="demo-item shape-crisp-edges">.shape-crisp-edges</div>
  <div class="demo-item shape-geometric-precision">.shape-geometric-precision</div>
  <div class="demo-item shape-inherit">.shape-inherit</div>
  <div class="demo-item shape-initial">.shape-initial</div>
</body>
</html>
