<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Dropzone | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="upload">
    <h1 class="upload__title">Upload your files</h1>

    <label class="upload__dropzone" for="file-input">
      <div class="upload__dropzone-inner">
        <div class="upload__icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <path d="M24 32V16M24 16l-6 6.67M24 16l6 6.67" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 33.37V38a4 4 0 004 4h24a4 4 0 004-4v-4.63" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="4" y="6" width="40" height="32" rx="6" stroke-width="0" fill="transparent"/>
          </svg>
        </div>
        <p class="upload__text">
          <span class="upload__text-main">Drag &amp; drop files here</span>
          <span class="upload__text-or">or</span>
          <span class="upload__link">browse files</span>
        </p>
        <p class="upload__hint">Supports PDF, PNG, JPG — Max 10MB</p>
      </div>
      <input type="file" id="file-input" class="upload__input" multiple>
    </label>

    <div class="upload__state">
      <p class="upload__state-text">No files selected</p>
    </div>
  </section>
</body>
</html>
