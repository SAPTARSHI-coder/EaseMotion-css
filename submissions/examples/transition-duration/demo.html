<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transition Duration Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item duration-0">.duration-0</div>
  <div class="demo-item duration-75">.duration-75</div>
  <div class="demo-item duration-100">.duration-100</div>
  <div class="demo-item duration-150">.duration-150</div>
  <div class="demo-item duration-200">.duration-200</div>
  <div class="demo-item duration-300">.duration-300</div>
</body>
</html>
