<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>grid-template-areas - EaseMotion</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 2rem; margin: 0; }h2 { color: #1e293b; margin-bottom: 1.5rem; }.gd { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }.c { background: #6c63ff; color: white; border-radius: 8px; padding: 2rem; text-align: center; font-weight: 700; }
</style>
</head>
<body>
<h2>Grid Template Areas Grid</h2>
<div class="gd">
  <div class="c">Grid Template Areas 1</div>
  <div class="c" style="background:#8b5cf6">Grid Template Areas 2</div>
  <div class="c">Grid Template Areas 3</div>
  <div class="c" style="background:#818cf8">Grid Template Areas 4</div>
  <div class="c" style="background:#6366f1">Grid Template Areas 5</div>
  <div class="c">Grid Template Areas 6</div>
</div>
</body>
</html>
