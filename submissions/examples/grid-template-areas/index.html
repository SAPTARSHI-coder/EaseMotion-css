<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grid Template Areas — EaseMotion CSS</title>
<style>
body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 2rem; margin: 0; }
h2 { color: hsl(232,58%,38%); margin-bottom: 1.5rem; font-size: 29px; }
.gd { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.5rem; }
.cell { background: hsl(232,73%,60%); color: white; border-radius: 15px; padding: 2rem; text-align: center; font-weight: 700; font-size: 1.1rem; }
</style>
</head>
<body>
<h2>Grid Template Areas — Grid Utilities</h2>
<div class="gd">
  <div class="cell">Grid Template Areas 1</div>
  <div class="cell" style="background:hsl(257,68%,52%)">Grid Template Areas 2</div>
  <div class="cell" style="background:linear-gradient(135deg, hsl(232,73%,60%), hsl(257,68%,52%))">Grid Template Areas 3</div>
  <div class="cell" style="background:hsl(217,83%,65%)">Grid Template Areas 4</div>
  <div class="cell" style="background:hsl(232,73%,60%);opacity:0.85">Grid Template Areas 5</div>
  <div class="cell" style="background:hsl(232,58%,38%)">Grid Template Areas 6</div>
</div>
</body>
</html>
