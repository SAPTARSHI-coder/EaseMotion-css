<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Navigation Tracker Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="tracker-header">
    <nav class="tracker-nav">
      <a href="#content-alpha" class="nav-segment active-segment">Overview</a>
      <a href="#content-beta" class="nav-segment">Features</a>
      <a href="#content-gamma" class="nav-segment">Performance</a>
    </nav>
  </header>

  <main class="viewport-container">
    <section id="content-alpha" class="viewport-section">
      <h2>System Overview</h2>
      <p>Scroll downward to observe the fluid layout highlight transitions.</p>
    </section>
    
    <section id="content-beta" class="viewport-section">
      <h2>Core Features</h2>
      <p>Self-contained cascading style components mapping view intersections.</p>
    </section>
    
    <section id="content-gamma" class="viewport-section">
      <h2>Performance Specs</h2>
      <p>Hardware-accelerated rendering transitions operating at 60fps.</p>
    </section>
  </main>

</body>
</html>
