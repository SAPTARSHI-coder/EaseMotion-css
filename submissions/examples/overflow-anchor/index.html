<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Overflow Anchor — EaseMotion CSS</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap");
body { font-family: "Manrope", system-ui, sans-serif; background: #f8fafc; padding: 2.5rem; margin: 0; }
h2 { color: hsl(270,55%,38%); font-size: 17px; margin-bottom: 1.75rem; font-weight: 700; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1.75rem; margin-top: 1rem; }
.card { padding: 2rem; color: white; border-radius: 18px; text-align: center; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
</style>
</head>
<body>
<h2>Overflow Anchor — Card Utilities</h2>
<div class="grid">
  <div class="card" style="background:hsl(270,70%,60%)">Overflow Anchor Primary</div>
  <div class="card" style="background:hsl(295,65%,52%)">Overflow Anchor Secondary</div>
  <div class="card" style="background:linear-gradient(135deg, hsl(270,70%,60%), hsl(295,65%,52%))">Overflow Anchor Featured</div>
  <div class="card" style="background:hsl(255,80%,65%)">Overflow Anchor Accent</div>
  <div class="card" style="background:transparent;border:2px solid hsl(270,70%,60%);color:hsl(270,70%,60%)">Overflow Anchor Ghost</div>
  <div class="card" style="background:hsl(270,70%,60%);opacity:0.82">Overflow Anchor Muted</div>
</div>
</body>
</html>
