<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSS Color Swatch Picker</title><link rel="stylesheet" href="style.css"></head><body><div class="swatch-picker"><input type="radio" name="swatch" id="s-red" class="swatch-picker__input" checked><label for="s-red" class="swatch-picker__swatch" style="--swatch:#e74c3c"></label><input type="radio" name="swatch" id="s-blue" class="swatch-picker__input"><label for="s-blue" class="swatch-picker__swatch" style="--swatch:#3498db"></label><input type="radio" name="swatch" id="s-green" class="swatch-picker__input"><label for="s-green" class="swatch-picker__swatch" style="--swatch:#2ecc71"></label><div class="swatch-picker__preview">Pick a color</div></div></body></html>
