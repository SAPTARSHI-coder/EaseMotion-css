<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variable Font Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght,wdth,slnt@14..32,100..900,75..100,0..12&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <span class="demo-title">Variable Font Animation</span>

  <div class="heading-wrapper">
    <h1 class="animated-heading" id="heading">
      Variable<br>Font Power
    </h1>
    <p class="subtitle">Font weight, width &amp; slant animated via CSS</p>
  </div>

  <div class="controls" id="controls">
    <div class="control-group">
      <label>
        Weight
        <span id="weightVal">400</span>
      </label>
      <input type="range" id="weightSlider" min="100" max="900" value="400" step="10">
      <span class="axis-badge"><code>wght</code></span>
    </div>

    <div class="control-group">
      <label>
        Width
        <span id="widthVal">100</span>
      </label>
      <input type="range" id="widthSlider" min="75" max="100" value="100" step="1">
      <span class="axis-badge"><code>wdth</code></span>
    </div>

    <div class="control-group">
      <label>
        Slant
        <span id="slantVal">0</span>
      </label>
      <input type="range" id="slantSlider" min="0" max="12" value="0" step="1">
      <span class="axis-badge"><code>slnt</code></span>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Animating</span>
    <button class="btn" id="resumeBtn" hidden>Resume Animation</button>
  </div>

  <p class="footer-note">Move any slider to pause · Adjust to explore the variable font axes</p>

  <script>
    const heading = document.getElementById('heading');
    const weightSlider = document.getElementById('weightSlider');
    const widthSlider = document.getElementById('widthSlider');
    const slantSlider = document.getElementById('slantSlider');
    const weightVal = document.getElementById('weightVal');
    const widthVal = document.getElementById('widthVal');
    const slantVal = document.getElementById('slantVal');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const resumeBtn = document.getElementById('resumeBtn');

    let userInteracted = false;

    function updateValues() {
      const w = weightSlider.value;
      const wi = widthSlider.value;
      const s = slantSlider.value;

      heading.style.setProperty('--weight', w);
      heading.style.setProperty('--width', wi);
      heading.style.setProperty('--slant', s);

      weightVal.textContent = w;
      widthVal.textContent = wi;
      slantVal.textContent = s;
    }

    function pauseAnimation() {
      if (!userInteracted) {
        userInteracted = true;
        heading.style.setProperty('--paused', 'paused');
        statusDot.classList.add('paused');
        statusText.textContent = 'Paused (slider moved)';
        resumeBtn.hidden = false;
      }
    }

    weightSlider.addEventListener('input', () => { pauseAnimation(); updateValues(); });
    widthSlider.addEventListener('input', () => { pauseAnimation(); updateValues(); });
    slantSlider.addEventListener('input', () => { pauseAnimation(); updateValues(); });

    resumeBtn.addEventListener('click', () => {
      userInteracted = false;
      heading.style.setProperty('--paused', 'running');
      statusDot.classList.remove('paused');
      statusText.textContent = 'Animating';
      resumeBtn.hidden = true;
    });
  </script>
</body>
</html>
