<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Searchable List</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Fruits</h1>
    <div class="ease-searchable">
      <input type="search" class="ease-searchable-input" placeholder="Search..." oninput="filter(this.value)">
      <ul class="ease-searchable-list">
        <li>Apple</li><li>Banana</li><li>Cherry</li><li>Date</li>
        <li>Elderberry</li><li>Fig</li><li>Grape</li><li>Honeydew</li>
      </ul>
    </div>
  </div>
  <script>
    function filter(q) {
      document.querySelectorAll('.ease-searchable-list li').forEach(li => {
        const text = li.textContent;
        const match = text.toLowerCase().includes(q.toLowerCase());
        li.style.display = match ? '' : 'none';
        if (match && q) li.innerHTML = text.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
        else li.textContent = text;
      });
    }
  </script>
</body>
</html>
