<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Dropdown - Stagger Animation Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Ease Dropdown</h1>
        <p>Click or tab into the dropdown to see staggered menu items</p>
        
        <div class="ease-dropdown">
            <button class="ease-dropdown__trigger">Menu ▼</button>
            <div class="ease-dropdown__menu">
                <a href="#" class="ease-dropdown__item">Profile</a>
                <a href="#" class="ease-dropdown__item">Settings</a>
                <a href="#" class="ease-dropdown__item">Messages</a>
                <a href="#" class="ease-dropdown__item">Logout</a>
            </div>
        </div>
    </div>
</body>
</html>
