<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Pagination</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pagination">
        <label>
            <input type="radio" name="page" checked>
            <span class="dot"></span>
        </label>
        <label>
            <input type="radio" name="page">
            <span class="dot"></span>
        </label>
        <label>
            <input type="radio" name="page">
            <span class="dot"></span>
        </label>
        <label>
            <input type="radio" name="page">
            <span class="dot"></span>
        </label>
    </div>
</body>
</html>
