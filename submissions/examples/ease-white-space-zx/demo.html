<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Space Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>White Space</h1>
    <p class="note">Controls how white space inside an element is handled.</p>
    <div class="label">ws-normal (collapses whitespace, wraps)</div>
    <div class="demo-ws ws-normal">Line 1 Line 2 Line 3</div>
    <div class="label">ws-nowrap (collapses, no wrap)</div>
    <div class="demo-ws ws-nowrap">This text does not wrap at all</div>
    <div class="label">ws-pre (preserves whitespace)</div>
    <div class="demo-ws ws-pre">Line 1 Line 2 Line 3</div>
  </body>
</html>
