<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-splitscreen-hero – Split Screen Hero</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-min-h-screen ease-flex ease-items-stretch">

  <div class="split-hero">
    <!-- Left Panel -->
    <div class="split-panel left-panel">
      <div class="panel-content">
        <h2 class="panel-title ease-text-4xl ease-font-bold ease-text-white">Designer</h2>
        <p class="panel-desc ease-text-lg ease-text-gray-200">Create stunning visuals with modern tools.</p>
        <button class="cta-btn ease-btn ease-btn-primary ease-hover-scale-105 ease-transition">Start Designing</button>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="split-panel right-panel">
      <div class="panel-content">
        <h2 class="panel-title ease-text-4xl ease-font-bold ease-text-white">Developer</h2>
        <p class="panel-desc ease-text-lg ease-text-gray-200">Build powerful applications with clean code.</p>
        <button class="cta-btn ease-btn ease-btn-primary ease-hover-scale-105 ease-transition">Start Coding</button>
      </div>
    </div>
  </div>

</body>
</html>
