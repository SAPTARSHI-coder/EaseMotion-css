<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion - Button Error State (Shake)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="em-wrap">
    <main class="em-card">
      <h1 class="em-title">Ease-button-error-state</h1>
      <p class="em-sub">Click the button to show an error state and shake animation.</p>

      <div class="em-row">
        <button id="errBtn" class="em-btn" type="button" aria-describedby="status">Trigger error</button>
        <button id="clearBtn" class="em-btn" type="button">Clear state</button>
      </div>

      <div id="status" class="em-hint" aria-live="polite">Status: idle</div>

      <p class="em-hint">
        Implementation approach: toggle <code>.em-btn--error</code> for the visual state, and toggle
        <code>.em-shake</code> to restart the animation.
      </p>
    </main>

    <script>
      const errBtn = document.getElementById('errBtn');
      const clearBtn = document.getElementById('clearBtn');
      const status = document.getElementById('status');

      function setErrorState() {
        status.textContent = 'Status: error (shaking)';

        // Ensure restart even if user clicks repeatedly.
        errBtn.classList.remove('em-shake');
        // Force reflow so the next animation plays.
        // eslint-disable-next-line no-unused-expressions
        errBtn.offsetHeight;

        errBtn.classList.add('em-btn--error', 'em-shake');

        // Remove shake class after animation completes.
        window.clearTimeout(setErrorState._t);
        setErrorState._t = window.setTimeout(() => {
          errBtn.classList.remove('em-shake');
          status.textContent = 'Status: error (not shaking)';
        }, 430);
      }

      function clearState() {
        status.textContent = 'Status: idle';
        errBtn.classList.remove('em-btn--error', 'em-shake');
      }

      errBtn.addEventListener('click', setErrorState);
      clearBtn.addEventListener('click', clearState);

      // Optional: expose to keyboard users quickly.
      errBtn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          // The click event will handle it for buttons in most browsers.
        }
      });
    </script>
  </body>
</html>
