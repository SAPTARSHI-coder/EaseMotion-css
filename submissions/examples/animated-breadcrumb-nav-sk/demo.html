<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Breadcrumb Nav</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav aria-label="Breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb__item"><a href="#" class="breadcrumb__link">Home</a></li>
      <li class="breadcrumb__item"><a href="#" class="breadcrumb__link">Products</a></li>
      <li class="breadcrumb__item"><a href="#" class="breadcrumb__link">Category</a></li>
      <li class="breadcrumb__item breadcrumb__item--active" aria-current="page">
        <span class="breadcrumb__link breadcrumb__link--current">Item</span>
      </li>
    </ol>
  </nav>
</body>
</html>
