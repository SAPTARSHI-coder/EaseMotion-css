<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-wrapper">

    <div class="ease-glass-card">

      <div class="status-badge">
        ● Online
      </div>

      <div class="profile-image">
        <img
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500"
          alt="Profile"
        >
      </div>

      <h2>Emma Wilson</h2>

      <p class="role">
        UI / UX Designer
      </p>

      <p class="bio">
        Passionate about crafting beautiful user experiences,
        design systems, and accessible interfaces.
      </p>

      <div class="stats">
        <div>
          <strong>245</strong>
          <span>Projects</span>
        </div>

        <div>
          <strong>18k</strong>
          <span>Followers</span>
        </div>

        <div>
          <strong>912</strong>
          <span>Following</span>
        </div>
      </div>

      <div class="actions">
        <button class="primary-btn">
          Follow
        </button>

        <button class="secondary-btn">
          Message
        </button>
      </div>

      <div class="social-links">
        <a href="#">Dribbble</a>
        <a href="#">GitHub</a>
        <a href="#">LinkedIn</a>
      </div>

    </div>

  </main>

</body>
</html>
