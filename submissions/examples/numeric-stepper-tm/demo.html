<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Numeric Stepper</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper" style="text-align:center;">
    <h1>Quantity</h1>
    <div class="ease-stepper">
      <button class="ease-stepper-dec" onclick="this.nextElementSibling.value=Math.max(0, +this.nextElementSibling.value-1)">-</button>
      <input type="number" value="1" min="0">
      <button class="ease-stepper-inc" onclick="this.previousElementSibling.value=+this.previousElementSibling.value+1">+</button>
    </div>
  </div>
</body>
</html>
