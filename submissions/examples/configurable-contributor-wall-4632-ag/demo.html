<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurable Contributor Wall Generator — EaseMotion CSS</title>
  <meta name="description" content="Dynamic grid dashboard showcasing configurable grid columns, gaps, and themes replacing hardcoded script variables.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Config Sandbox</span>
      <h1>Configurable Contributor Wall</h1>
      <p class="description">
        Demonstrates why hardcoded script values (like columns or file paths) limit layouts.
        Modify parameters below to dynamically adjust the contributor wall output.
      </p>
    </header>

    <main class="dashboard">

      <!-- Left Panel: Grid Settings -->
      <section class="controls-panel">
        <h2 class="section-title">Grid Configuration</h2>
        
        <div class="control-group">
          <label for="column-count">Grid Columns: <span id="col-val">4</span></label>
          <input type="range" id="column-count" min="2" max="6" value="4">
        </div>

        <div class="control-group">
          <label for="gap-size">Grid Gap: <span id="gap-val">16px</span></label>
          <input type="range" id="gap-size" min="8" max="40" value="16" step="4">
        </div>

        <div class="control-group">
          <label for="theme-color">Theme Accents:</label>
          <select id="theme-color">
            <option value="#7c3aed">Purple (Default)</option>
            <option value="#10b981">Emerald Green</option>
            <option value="#06b6d4">Cyan Ocean</option>
            <option value="#ef4444">Crimson Red</option>
          </select>
        </div>
      </section>

      <!-- Right Panel: Wall Output -->
      <section class="wall-panel">
        <h2 class="section-title">Contributor Wall Preview</h2>
        
        <div class="wall-grid" id="wall-preview" style="--cols: 4; --gap: 16px; --accent: #7c3aed;">
          <div class="contributor-avatar"><span>A</span></div>
          <div class="contributor-avatar"><span>B</span></div>
          <div class="contributor-avatar"><span>C</span></div>
          <div class="contributor-avatar"><span>D</span></div>
          <div class="contributor-avatar"><span>E</span></div>
          <div class="contributor-avatar"><span>F</span></div>
          <div class="contributor-avatar"><span>G</span></div>
          <div class="contributor-avatar"><span>H</span></div>
        </div>
      </section>

    </main>
  </div>

  <script>
    const wall = document.getElementById('wall-preview');
    
    const colSlider = document.getElementById('column-count');
    const gapSlider = document.getElementById('gap-size');
    const themeSelect = document.getElementById('theme-color');
    
    const colVal = document.getElementById('col-val');
    const gapVal = document.getElementById('gap-val');

    const updateWall = () => {
      const cols = colSlider.value;
      const gap = `${gapSlider.value}px`;
      const color = themeSelect.value;
      
      colVal.textContent = cols;
      gapVal.textContent = gap;
      
      wall.style.setProperty('--cols', cols);
      wall.style.setProperty('--gap', gap);
      wall.style.setProperty('--accent', color);
    };

    colSlider.addEventListener('input', updateWall);
    gapSlider.addEventListener('input', updateWall);
    themeSelect.addEventListener('change', updateWall);
  </script>

</body>
</html>
