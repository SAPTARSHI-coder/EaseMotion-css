<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item content-none">.content-none</div>
  <div class="demo-item content-normal">.content-normal</div>
  <div class="demo-item content-open-quote">.content-open-quote</div>
  <div class="demo-item content-close-quote">.content-close-quote</div>
  <div class="demo-item content-no-open-quote">.content-no-open-quote</div>
  <div class="demo-item content-no-close-quote">.content-no-close-quote</div>
</body>
</html>
