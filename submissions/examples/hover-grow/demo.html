<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submission — Hover Grow</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Hover Grow</h1>
    <p>Hover any of the boxes below to see the scale effect.</p>

    <div class="demo-grid">
      <div class="hover-grow-card">
        <div class="icon">🚀</div>
        <h3>Scale Up</h3>
        <p>Hover to grow this element with an elastic bounce.</p>
      </div>

      <button class="hover-grow-btn">Hover Me</button>

      <img
        class="hover-grow-img"
        src="https://picsum.photos/seed/flow/320/200"
        alt="Hover grow on image"
        width="320"
        height="200"
      />
    </div>
  </body>
</html>
