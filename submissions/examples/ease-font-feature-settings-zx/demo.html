<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Feature Settings Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Font Feature Settings</h1>
    <p class="note">
      Controls OpenType font features like ligatures, kerning, and stylistic
      alternates.
    </p>
    <div class="label">liga-on (standard ligatures)</div>
    <div class="demo-feat liga-on">ffi fl ffl</div>
    <div class="label">liga-off</div>
    <div class="demo-feat liga-off">ffi fl ffl</div>
    <div class="label">kern-on (kerning)</div>
    <div class="demo-feat kern-on">AV Wa To</div>
    <div class="label">salt-on (stylistic alternates)</div>
    <div class="demo-feat salt-on">Aa Bb Gg</div>
  </body>
</html>
