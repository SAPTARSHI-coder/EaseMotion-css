<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text Justify Utilities — EaseMotion CSS</title>
<style>
body { font-family: system-ui, sans-serif; background: #fff; padding: 2rem; max-width: 720px; margin: 0 auto; }
h2 { color: hsl(271,83%,60%); border-bottom: 2px solid hsl(271,83%,60%); padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
ul { list-style: none; padding: 0; margin: 0; }
li { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1.2rem; border-bottom: 1px solid #e2e8f0; }
li:first-child { border-top: 1px solid #e2e8f0; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; background: hsl(271,83%,60%); color: white; }
</style>
</head>
<body>
<h2>Text Justify Utilities — Row Utilities</h2>
<ul>
  <li style="border-left:5px solid hsl(271,83%,60%);padding-left:calc(1.2rem - 5px)">Text Justify Utilities item one <span class="badge" style="background:hsl(271,83%,60%)">NEW</span></li>
  <li>Text Justify Utilities item two</li>
  <li>Text Justify Utilities item three <span class="badge" style="background:hsl(296,78%,52%)">v2</span></li>
  <li>Text Justify Utilities item four</li>
  <li>Text Justify Utilities item five <span class="badge" style="background:#16a34a">stable</span></li>
</ul>
</body>
</html>
