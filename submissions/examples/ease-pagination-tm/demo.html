<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Pagination - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <h1>Animated Pagination</h1>
    <p class="description">Smooth page navigation with animated hover and active states</p>

    <!-- Default pagination -->
    <div class="demo-section">
      <h2>Default</h2>
      <nav class="ease-pagination" aria-label="Page navigation">
        <a href="#" class="ease-page-item ease-page-prev" aria-label="Previous page">
          <span class="ease-page-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </span>
          <span>Prev</span>
        </a>
        <a href="#" class="ease-page-item ease-page-link">1</a>
        <a href="#" class="ease-page-item ease-page-link">2</a>
        <span class="ease-page-item ease-page-active" aria-current="page">3</span>
        <a href="#" class="ease-page-item ease-page-link">4</a>
        <a href="#" class="ease-page-item ease-page-link">5</a>
        <span class="ease-page-ellipsis" aria-hidden="true">&hellip;</span>
        <a href="#" class="ease-page-item ease-page-link">10</a>
        <a href="#" class="ease-page-item ease-page-next" aria-label="Next page">
          <span>Next</span>
          <span class="ease-page-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </span>
        </a>
      </nav>
    </div>

    <!-- Small variant -->
    <div class="demo-section">
      <h2>Small</h2>
      <nav class="ease-pagination ease-pagination-sm" aria-label="Page navigation">
        <a href="#" class="ease-page-item ease-page-prev" aria-label="Previous">&#8592;</a>
        <a href="#" class="ease-page-item ease-page-link">1</a>
        <span class="ease-page-item ease-page-active" aria-current="page">2</span>
        <a href="#" class="ease-page-item ease-page-link">3</a>
        <a href="#" class="ease-page-item ease-page-link">4</a>
        <a href="#" class="ease-page-item ease-page-next" aria-label="Next">&#8594;</a>
      </nav>
    </div>

    <!-- Large variant -->
    <div class="demo-section">
      <h2>Large</h2>
      <nav class="ease-pagination ease-pagination-lg" aria-label="Page navigation">
        <a href="#" class="ease-page-item ease-page-prev" aria-label="Previous page">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Prev
        </a>
        <a href="#" class="ease-page-item ease-page-link">1</a>
        <a href="#" class="ease-page-item ease-page-link">2</a>
        <span class="ease-page-item ease-page-active" aria-current="page">3</span>
        <a href="#" class="ease-page-item ease-page-link">4</a>
        <a href="#" class="ease-page-item ease-page-link">5</a>
        <a href="#" class="ease-page-item ease-page-link">6</a>
        <span class="ease-page-ellipsis">&hellip;</span>
        <a href="#" class="ease-page-item ease-page-link">20</a>
        <a href="#" class="ease-page-item ease-page-next" aria-label="Next page">
          Next
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </a>
      </nav>
    </div>

    <!-- Disabled prev (at start) -->
    <div class="demo-section">
      <h2>At Start (Prev Disabled)</h2>
      <nav class="ease-pagination" aria-label="Page navigation">
        <span class="ease-page-item ease-page-prev ease-page-disabled" aria-disabled="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Prev
        </span>
        <span class="ease-page-item ease-page-active" aria-current="page">1</span>
        <a href="#" class="ease-page-item ease-page-link">2</a>
        <a href="#" class="ease-page-item ease-page-link">3</a>
        <a href="#" class="ease-page-item ease-page-next" aria-label="Next page">
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </a>
      </nav>
    </div>
  </div>

</body>
</html>
