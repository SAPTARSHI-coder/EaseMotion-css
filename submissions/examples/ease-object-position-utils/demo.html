<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-object-position Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .demo-grid {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .box {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
        text-align: center;
      }
      .thumb {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 6px;
        background: #f1f5f9;
      }
      code {
        background: #f1f5f9;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h2>object-position Utilities</h2>
    <p>
      Each 120x120 box uses a colorful placeholder image with different
      <code>object-position</code> values:
    </p>

    <div class="demo-grid">
      <div class="box">
        <div><code>ease-object-position-top</code></div>
        <img
          src="https://placehold.co/200x150/6366f1/fff"
          class="thumb ease-object-position-top"
        />
      </div>
      <div class="box">
        <div><code>ease-object-position-bottom</code></div>
        <img
          src="https://placehold.co/200x150/6366f1/fff"
          class="thumb ease-object-position-bottom"
        />
      </div>
      <div class="box">
        <div><code>ease-object-position-center</code></div>
        <img
          src="https://placehold.co/200x150/6366f1/fff"
          class="thumb ease-object-position-center"
        />
      </div>
      <div class="box">
        <div><code>ease-object-position-left</code></div>
        <img
          src="https://placehold.co/200x150/6366f1/fff"
          class="thumb ease-object-position-left"
        />
      </div>
      <div class="box">
        <div><code>ease-object-position-right</code></div>
        <img
          src="https://placehold.co/200x150/6366f1/fff"
          class="thumb ease-object-position-right"
        />
      </div>
    </div>
  </body>
</html>
