<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accent-Color Forms — CSS accent-color Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>accent-color</h1>
    <p class="subhead">Native form controls themed with a single CSS property</p>
  </header>

  <div class="container">

    <section class="theme-panel">
      <h2>Theme Presets</h2>
      <div class="theme-row">
        <button class="theme-btn" data-color="#6c63ff" style="--swatch:#6c63ff" aria-label="Indigo theme"></button>
        <button class="theme-btn" data-color="#f43f5e" style="--swatch:#f43f5e" aria-label="Rose theme"></button>
        <button class="theme-btn" data-color="#10b981" style="--swatch:#10b981" aria-label="Emerald theme"></button>
        <button class="theme-btn" data-color="#f59e0b" style="--swatch:#f59e0b" aria-label="Amber theme"></button>
        <button class="theme-btn" data-color="#8b5cf6" style="--swatch:#8b5cf6" aria-label="Violet theme"></button>
        <button class="theme-btn" data-color="#06b6d4" style="--swatch:#06b6d4" aria-label="Cyan theme"></button>
        <button class="theme-btn" data-color="#ec4899" style="--swatch:#ec4899" aria-label="Pink theme"></button>
        <label class="custom-picker" style="--swatch:#6c63ff">
          <input type="color" id="custom-color" value="#6c63ff">
          <span class="picker-label">Custom</span>
        </label>
      </div>
    </section>

    <form class="demo-form">
      <fieldset>
        <legend>Checkboxes</legend>
        <label class="ctrl"><input type="checkbox" checked> Subscribe to newsletter</label>
        <label class="ctrl"><input type="checkbox"> Accept terms</label>
        <label class="ctrl"><input type="checkbox" checked> Enable notifications</label>
      </fieldset>

      <fieldset>
        <legend>Radio Buttons</legend>
        <label class="ctrl"><input type="radio" name="plan" checked> Free</label>
        <label class="ctrl"><input type="radio" name="plan"> Pro</label>
        <label class="ctrl"><input type="radio" name="plan"> Enterprise</label>
      </fieldset>

      <fieldset>
        <legend>Range Sliders</legend>
        <div class="ctrl slider">
          <span>Volume</span>
          <input type="range" min="0" max="100" value="65">
          <output>65</output>
        </div>
        <div class="ctrl slider">
          <span>Brightness</span>
          <input type="range" min="0" max="100" value="40">
          <output>40</output>
        </div>
      </fieldset>

      <fieldset>
        <legend>Progress Bars</legend>
        <div class="ctrl pbar">
          <span>Storage</span>
          <progress value="72" max="100"></progress>
        </div>
        <div class="ctrl pbar">
          <span>Bandwidth</span>
          <progress value="45" max="100"></progress>
        </div>
      </fieldset>

      <fieldset>
        <legend>Switches</legend>
        <label class="ctrl"><input type="checkbox" role="switch" checked> Dark mode</label>
        <label class="ctrl"><input type="checkbox" role="switch"> Auto-play</label>
        <label class="ctrl"><input type="checkbox" role="switch" checked> Sound</label>
      </fieldset>
    </form>

  </div>

  <footer>
    <p><code>accent-color</code> works in Chrome 93+, Firefox 92+, Safari 15.4+</p>
  </footer>

  <script>
    const root = document.documentElement;
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => root.style.setProperty('--accent', btn.dataset.color));
    });
    document.getElementById('custom-color').addEventListener('input', e => {
      root.style.setProperty('--accent', e.target.value);
      e.target.closest('.custom-picker').style.setProperty('--swatch', e.target.value);
    });
    document.querySelectorAll('.slider input').forEach(slider => {
      slider.addEventListener('input', () => slider.nextElementSibling.textContent = slider.value);
    });
  </script>
</body>
</html>
