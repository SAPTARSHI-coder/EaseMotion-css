<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS — Animation Playground</title>
    <!-- Fixed the path to easemotion.min.css (it's 3 levels up from submissions/examples/playground-iteration-lk) -->
    <link rel="stylesheet" href="../../../easemotion.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container ease-fade-in">
      <h1>Animation Playground</h1>
      <p>Test combinations of animation type, duration, delay, and iteration count.</p>

      <div class="controls">
        <div class="control-group">
          <label>Select Animation Type:</label>
          <div class="checkbox-group" id="animationList">
            <label><input type="checkbox" value="ease-fade-in" /> ease-fade-in</label>
            <label><input type="checkbox" value="ease-slide-up" /> ease-slide-up</label>
            <label><input type="checkbox" value="ease-bounce" /> ease-bounce</label>
            <label><input type="checkbox" value="ease-rotate" /> ease-rotate</label>
          </div>
        </div>

        <div class="input-group">
          <div>
            <label for="duration">Duration (ms)</label>
            <input type="number" id="duration" value="400" min="100" />
          </div>
          <div>
            <label for="delay">Delay (ms)</label>
            <input type="number" id="delay" value="0" min="0" />
          </div>
          <div>
            <label for="iteration">Iteration Count</label>
            <input type="text" id="iteration" value="1" placeholder="e.g. 1, infinite" />
          </div>
        </div>
      </div>

      <div class="preview-area">
        <div id="previewBox" class="preview-box">Preview</div>
      </div>

      <div class="generated-code">
        <code id="generatedClass">ease-</code>
      </div>
    </div>

    <script>
      const listContainer = document.getElementById("animationList");
      const durationInput = document.getElementById("duration");
      const delayInput = document.getElementById("delay");
      const iterationInput = document.getElementById("iteration");
      const previewBox = document.getElementById("previewBox");
      const generatedCodeEl = document.getElementById("generatedClass");

      function updateGenerated() {
        const selected = Array.from(
          listContainer.querySelectorAll("input[type=checkbox]:checked")
        ).map((cb) => cb.value);
        
        const duration = durationInput.value;
        const delay = delayInput.value;
        const iteration = iterationInput.value;
        
        let classStr = selected.join(" ");
        
        // Reset animation to replay it
        previewBox.className = "preview-box";
        void previewBox.offsetWidth; // trigger reflow
        
        if (classStr) {
          previewBox.className = "preview-box " + classStr;
        }
        
        previewBox.style.animationDuration = duration + "ms";
        previewBox.style.animationDelay = delay + "ms";
        previewBox.style.animationIterationCount = iteration;
        
        generatedCodeEl.textContent = classStr || "ease-";
      }

      listContainer.addEventListener("change", updateGenerated);
      durationInput.addEventListener("input", updateGenerated);
      delayInput.addEventListener("input", updateGenerated);
      iterationInput.addEventListener("input", updateGenerated);
      
      updateGenerated();
    </script>
  </body>
</html>
