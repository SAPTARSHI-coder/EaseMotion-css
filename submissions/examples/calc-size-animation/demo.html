<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calc-size() Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="cs-container">
    <h1>calc-size() Animation</h1>
    <div class="toggle-wrapper">
      <button id="toggle-btn" onclick="document.querySelector('.cs-box').classList.toggle('cs-open')">Toggle Content</button>
    </div>
<div class="cs-box ease-calc-size">
  <div class="cs-inner">
    <p>This container animates height from <code>0</code> to <code>auto</code> using <code>calc-size()</code>.</p>
    <p>Unlike max-height hacks, this is a true <code>auto</code> keyword interpolation.</p>
  </div>
</div>
  </main>
</body>
</html>
