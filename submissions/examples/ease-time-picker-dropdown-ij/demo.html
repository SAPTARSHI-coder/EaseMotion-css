<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Picker Dropdown - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tpd-container">
    <h1>Time Picker Dropdown</h1>
    <p class="tpd-desc">Click the input field to open the time selector</p>

    <div class="tpd-wrapper">
      <div class="tpd-input-group" id="tpdInputGroup">
        <input class="tpd-input" type="text" id="tpdDisplay" placeholder="Select time" readonly>
        <span class="tpd-icon">&#9200;</span>
      </div>

      <div class="tpd-dropdown" id="tpdDropdown">
        <div class="tpd-columns">
          <div class="tpd-col">
            <div class="tpd-col-label">Hour</div>
            <div class="tpd-list" id="tpdHours">
              <div class="tpd-item" data-value="12">12</div>
              <div class="tpd-item" data-value="01">01</div>
              <div class="tpd-item" data-value="02">02</div>
              <div class="tpd-item" data-value="03">03</div>
              <div class="tpd-item" data-value="04">04</div>
              <div class="tpd-item" data-value="05">05</div>
              <div class="tpd-item" data-value="06">06</div>
              <div class="tpd-item" data-value="07">07</div>
              <div class="tpd-item" data-value="08">08</div>
              <div class="tpd-item" data-value="09">09</div>
              <div class="tpd-item" data-value="10">10</div>
              <div class="tpd-item" data-value="11">11</div>
            </div>
          </div>
          <div class="tpd-col">
            <div class="tpd-col-label">Minute</div>
            <div class="tpd-list" id="tpdMinutes">
              <div class="tpd-item" data-value="00">00</div>
              <div class="tpd-item" data-value="05">05</div>
              <div class="tpd-item" data-value="10">10</div>
              <div class="tpd-item" data-value="15">15</div>
              <div class="tpd-item" data-value="20">20</div>
              <div class="tpd-item" data-value="25">25</div>
              <div class="tpd-item" data-value="30">30</div>
              <div class="tpd-item" data-value="35">35</div>
              <div class="tpd-item" data-value="40">40</div>
              <div class="tpd-item" data-value="45">45</div>
              <div class="tpd-item" data-value="50">50</div>
              <div class="tpd-item" data-value="55">55</div>
            </div>
          </div>
          <div class="tpd-col">
            <div class="tpd-col-label">Period</div>
            <div class="tpd-list" id="tpdPeriod">
              <div class="tpd-item tpd-item-active" data-value="AM">AM</div>
              <div class="tpd-item" data-value="PM">PM</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var display = document.getElementById('tpdDisplay');
      var group = document.getElementById('tpdInputGroup');
      var dropdown = document.getElementById('tpdDropdown');
      var hours = document.getElementById('tpdHours');
      var minutes = document.getElementById('tpdMinutes');
      var period = document.getElementById('tpdPeriod');

      var selHour = '12';
      var selMin = '00';
      var selPeriod = 'AM';

      function updateDisplay() {
        display.value = selHour + ':' + selMin + ' ' + selPeriod;
      }

      function closeDropdown() {
        group.classList.remove('tpd-open');
        dropdown.classList.remove('tpd-open');
      }

      function openDropdown() {
        group.classList.add('tpd-open');
        dropdown.classList.add('tpd-open');
      }

      group.addEventListener('click', function(e) {
        if (dropdown.classList.contains('tpd-open')) {
          closeDropdown();
        } else {
          openDropdown();
        }
      });

      function pickItem(container, callback) {
        var items = container.querySelectorAll('.tpd-item');
        for (var i = 0; i < items.length; i++) {
          items[i].addEventListener('click', function(e) {
            e.stopPropagation();
            for (var j = 0; j < items.length; j++) {
              items[j].classList.remove('tpd-item-active');
            }
            this.classList.add('tpd-item-active');
            callback(this.getAttribute('data-value'));
            updateDisplay();
          });
        }
      }

      pickItem(hours, function(v) { selHour = v; });
      pickItem(minutes, function(v) { selMin = v; });
      pickItem(period, function(v) { selPeriod = v; });

      document.addEventListener('click', function(e) {
        var wrapper = document.querySelector('.tpd-wrapper');
        if (wrapper && !wrapper.contains(e.target)) {
          closeDropdown();
        }
      });
    })();
  </script>
</body>
</html>
