<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Section Divider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="section section--top">
    <div class="section__content">
      <h2>Explore</h2>
      <p>Discover the possibilities with our platform. Endless features at your fingertips.</p>
    </div>
  </section>
  <div class="divider">
    <div class="divider__wave"></div>
  </div>
  <section class="section section--bottom">
    <div class="section__content">
      <h2>Create</h2>
      <p>Build something amazing today. Your ideas, our technology — limitless potential.</p>
    </div>
  </section>
</body>
</html>
