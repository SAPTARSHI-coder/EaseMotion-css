<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Progress Ring — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Circular Progress Ring</h1>
  <p class="subtitle">A radial progress ring component using CSS conic-gradient — pure CSS.</p>
  <section><h2>Demo</h2><div class="ring-group"><div class="ring" style="--pct:25"><span>25%</span></div><div class="ring" style="--pct:50"><span>50%</span></div><div class="ring" style="--pct:75"><span>75%</span></div><div class="ring" style="--pct:100"><span>100%</span></div></div></section>
  <section><h2>How It Works</h2><p>The ring uses <code>conic-gradient</code> with a CSS custom property <code>--pct</code> for the fill percentage. A pseudo-element masks the center to create the donut shape.</p></section>
</body>
</html>
