<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Segmented Control</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>View</h1>
    <div class="ease-segmented">
      <input type="radio" id="day" name="seg" checked>
      <label for="day">Day</label>
      <input type="radio" id="week" name="seg">
      <label for="week">Week</label>
      <input type="radio" id="month" name="seg">
      <label for="month">Month</label>
    </div>
  </div>
</body>
</html>
