<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-scroll demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="pbar"></div>

<div class="w" style="text-align:center;padding:4rem 0 2rem">
  <h1 style="font-size:1.5rem;margin:0 0 0.25rem">ease-scroll-*</h1>
  <p style="color:#666;font-size:.9rem;margin:0">scroll-driven animation utilities for EaseMotion CSS</p>
</div>

<div class="sp">↓ scroll</div>

<div class="box w fd">
  <strong>.fd</strong> — fade in + slide up 20px
</div>

<div class="sp"></div>

<div style="display:flex;gap:.75rem" class="w">
  <div class="box sd" style="flex:1"><strong>.sd</strong> — slide from right</div>
  <div class="box sr" style="flex:1"><strong>.sr</strong> — slide from left</div>
</div>

<div class="sp"></div>

<div class="box w zm"><strong>.zm</strong> — scale up from 0.85</div>

<div class="sp"></div>

<div class="w" style="text-align:center;font-size:.85rem;color:#999">— fin —</div>

</body>
</html>
