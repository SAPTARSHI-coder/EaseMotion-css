<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Loading Spinner</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: white;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            gap: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6c63ff, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: #94a3b8; margin-bottom: 1.5rem; }
        h2 {
            color: #a78bfa;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .demo-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            min-height: 150px;
            justify-content: center;
        }
        .demo-card .label {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>✨ Loading Spinners</h1>
            <p class="subtitle">Pure CSS animated loading indicators</p>
        </div>

        <!-- Spinner Variants -->
        <div>
            <h2>🎨 Spinner Variants</h2>
            <div class="demo-grid">
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic"></div>
                    <span class="label">Classic</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="label">Dots</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-pulse"></div>
                    <span class="label">Pulse</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-gradient"></div>
                    <span class="label">Gradient</span>
                </div>
            </div>
        </div>

        <!-- Size Variants -->
        <div>
            <h2>📏 Size Variants</h2>
            <div class="demo-grid">
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic ease-spinner-cv-sm"></div>
                    <span class="label">Small (24px)</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic"></div>
                    <span class="label">Medium (40px)</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic ease-spinner-cv-lg"></div>
                    <span class="label">Large (60px)</span>
                </div>
            </div>
        </div>

        <!-- Color Variants -->
        <div>
            <h2>🌈 Color Variants</h2>
            <div class="demo-grid">
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic ease-spinner-cv-primary"></div>
                    <span class="label">Primary</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic ease-spinner-cv-info"></div>
                    <span class="label">Info</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic ease-spinner-cv-success"></div>
                    <span class="label">Success</span>
                </div>
                <div class="demo-card">
                    <div class="ease-spinner-cv ease-spinner-cv-classic ease-spinner-cv-white"></div>
                    <span class="label">White</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
