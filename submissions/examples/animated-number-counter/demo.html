<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Number Counter — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Animated Number Counter</h1>
  <p class="subtitle">A CSS animated number counter using @property integer animation — pure CSS.</p>
  <section><h2>Demo</h2><div class="counter-group"><div class="counter" style="--num:1000"><span class="count">0</span><span class="label">Downloads</span></div><div class="counter" style="--num:500"><span class="count">0</span><span class="label">Stars</span></div><div class="counter" style="--num:250"><span class="count">0</span><span class="label">Contributors</span></div></div></section>
  <section><h2>How It Works</h2><p>Uses <code>@property --num</code> to animate an integer value. The <code>counter</code> element's <code>::before</code> displays the counter value via the <code>counter-reset</code> property.</p></section>
</body>
</html>
