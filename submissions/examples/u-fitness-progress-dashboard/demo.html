<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Progress Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="fitness-dashboard">
        <h1>Fitness Progress Dashboard</h1>

        <div class="fitness-grid">
            <article class="fitness-card">
                <h3>Daily Steps</h3>
                <div class="progress-bar">
                    <div class="progress-fill steps"></div>
                </div>
                <span>8,500 / 10,000 Steps</span>
            </article>

            <article class="fitness-card">
                <h3>Calories Burned</h3>
                <div class="progress-bar">
                    <div class="progress-fill calories"></div>
                </div>
                <span>1,850 / 2,200 kcal</span>
            </article>

            <article class="fitness-card">
                <h3>Workout Goal</h3>
                <div class="progress-bar">
                    <div class="progress-fill workout"></div>
                </div>
                <span>4 / 5 Sessions</span>
            </article>
        </div>

        <div class="achievements">
            <h2>Achievements</h2>

            <div class="badge-container">
                <span class="achievement-badge">🏃 10K Steps</span>
                <span class="achievement-badge">🔥 7 Day Streak</span>
                <span class="achievement-badge">🏆 Goal Crusher</span>
            </div>
        </div>
    </section>
</body>
</html>
