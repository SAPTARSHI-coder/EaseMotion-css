<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Transform Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Text Transform</h1>
    <p class="note">Controls the capitalization of text.</p>
    <div class="label">tt-lower</div>
    <div class="demo-tt tt-lower">The Quick Brown Fox</div>
    <div class="label">tt-upper</div>
    <div class="demo-tt tt-upper">The Quick Brown Fox</div>
    <div class="label">tt-capitalize</div>
    <div class="demo-tt tt-capitalize">the quick brown fox</div>
    <div class="label">tt-none</div>
    <div class="demo-tt tt-none">The Quick Brown Fox</div>
  </body>
</html>
