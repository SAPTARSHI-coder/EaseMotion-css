<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-pop – Quick Pop Scale</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Quick Pop</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Click the button to make the card pop once.</p>

    <div id="pop-box" class="pop-card ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-shadow-md">
      <p class="ease-text-lg ease-font-semibold">Pop!</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">Attention grabber</p>
    </div>

    <button id="pop-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">Pop</button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      <code>scale(1) → scale(1.15) → scale(1)</code> in 0.3s, one-shot.
    </p>
  </div>

  <script>
    const box = document.getElementById('pop-box');
    document.getElementById('pop-btn').addEventListener('click', () => {
      box.classList.remove('pop');
      void box.offsetWidth;          // force reflow to restart
      box.classList.add('pop');
    });
  </script>

</body>
</html>
