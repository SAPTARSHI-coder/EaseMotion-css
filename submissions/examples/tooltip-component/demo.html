<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Neon Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="card-border"></div>

    <div class="profile">
        <img src="https://picsum.photos/200" alt="Profile">
    </div>

    <h2>Neha Varia</h2>

    <p class="role">Frontend Developer</p>

    <p class="desc">
        Building futuristic web experiences with animation,
        creativity and clean design.
    </p>

    <div class="stats">
        <div>
            <h3>50+</h3>
            <span>Projects</span>
        </div>

        <div>
            <h3>10K+</h3>
            <span>Users</span>
        </div>

        <div>
            <h3>5★</h3>
            <span>Rating</span>
        </div>
    </div>

    <div class="buttons">
        <button>Follow</button>
        <button>Message</button>
    </div>
</div>

</body>
</html>
