<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transform All Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item transform-none">.transform-none</div>
  <div class="demo-item transform-scale">.transform-scale</div>
  <div class="demo-item transform-scale-90">.transform-scale-90</div>
  <div class="demo-item transform-scale-95">.transform-scale-95</div>
  <div class="demo-item transform-scale-100">.transform-scale-100</div>
  <div class="demo-item transform-scale-105">.transform-scale-105</div>
</body>
</html>
