<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Toast Component</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Notification Toast Component</h1>
    <p class="subtitle">
      Success, warning, and error toast variants built with pure HTML and CSS.
    </p>

    <div class="toast-stack">

      <div class="toast toast-success">
        <div class="toast-icon">✓</div>
        <div class="toast-content">
          <h3>Success</h3>
          <p>Your profile has been updated successfully.</p>
        </div>
      </div>

      <div class="toast toast-warning">
        <div class="toast-icon">!</div>
        <div class="toast-content">
          <h3>Warning</h3>
          <p>Your storage space is running low.</p>
        </div>
      </div>

      <div class="toast toast-error">
        <div class="toast-icon">✕</div>
        <div class="toast-content">
          <h3>Error</h3>
          <p>Unable to connect to the server. Please try again.</p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
