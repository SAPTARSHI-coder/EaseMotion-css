<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace Quick Actions Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>⚡ Workspace Quick Actions Hub</h1>
        <p>Access your most frequently used workspace actions instantly.</p>
    </header>

    <section class="actions-grid">

        <div class="action-card">
            <span>➕</span>
            <h3>New Task</h3>
        </div>

        <div class="action-card">
            <span>📁</span>
            <h3>Projects</h3>
        </div>

        <div class="action-card">
            <span>📅</span>
            <h3>Meetings</h3>
        </div>

        <div class="action-card">
            <span>📊</span>
            <h3>Reports</h3>
        </div>

        <div class="action-card">
            <span>👥</span>
            <h3>Team</h3>
        </div>

        <div class="action-card">
            <span>⚙️</span>
            <h3>Settings</h3>
        </div>

    </section>

</div>

</body>
</html>
