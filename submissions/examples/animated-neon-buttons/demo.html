<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Neon Border Button Collection — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Demo page chrome only — not part of the component */
    body {
      background: #050508;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #aaa;
      padding: 3rem 1.5rem 5rem;
    }

    .page-title {
      text-align: center;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 0.35em;
    }
    .page-subtitle {
      text-align: center;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 3.5rem;
    }

    /* Section grid */
    .section {
      max-width: 860px;
      margin: 0 auto 3.5rem;
    }
    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #444;
      border-top: 1px solid #1a1a1a;
      padding-top: 0.7rem;
      margin-bottom: 1.6rem;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.1rem;
      align-items: center;
    }

    /* Theme grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 2rem;
      max-width: 860px;
      margin: 0 auto 3.5rem;
    }
    .theme-col {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: flex-start;
    }
    .theme-name {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3a3a3a;
      margin-bottom: 0.2rem;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #2a2a2a;
      letter-spacing: 0.1em;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

  <h1 class="page-title">Neon Border Buttons</h1>
  <p class="page-subtitle">EaseMotion CSS — Animated Component Collection</p>

  <!-- ── Variants ── -->
  <div class="section">
    <p class="section-label">Variants</p>
    <div class="btn-row">
      <button class="neon-btn cta plasma">Launch</button>
      <button class="neon-btn outline arctic">Connect</button>
      <button class="neon-btn acid">Execute</button>
      <button class="neon-btn icon infrared" aria-label="Power">⚡</button>
      <button class="neon-btn icon plasma"   aria-label="Settings">⚙</button>
      <button class="neon-btn icon arctic"   aria-label="Search">⌖</button>
    </div>
  </div>

  <!-- ── Sizes ── -->
  <div class="section">
    <p class="section-label">Sizes</p>
    <div class="btn-row">
      <button class="neon-btn sm acid">Small</button>
      <button class="neon-btn plasma">Default</button>
      <button class="neon-btn lg infrared">Large</button>
    </div>
  </div>

  <!-- ── All 4 Themes × All Variants ── -->
  <div class="section">
    <p class="section-label">All Themes</p>
  </div>
  <div class="theme-grid">

    <div class="theme-col">
      <span class="theme-name">Plasma</span>
      <button class="neon-btn cta plasma">CTA Plasma</button>
      <button class="neon-btn outline plasma">Outline</button>
      <button class="neon-btn plasma">Default</button>
      <button class="neon-btn icon plasma" aria-label="Star">★</button>
    </div>

    <div class="theme-col">
      <span class="theme-name">Acid</span>
      <button class="neon-btn cta acid">CTA Acid</button>
      <button class="neon-btn outline acid">Outline</button>
      <button class="neon-btn acid">Default</button>
      <button class="neon-btn icon acid" aria-label="Bolt">⚡</button>
    </div>

    <div class="theme-col">
      <span class="theme-name">Infrared</span>
      <button class="neon-btn cta infrared">CTA Infrared</button>
      <button class="neon-btn outline infrared">Outline</button>
      <button class="neon-btn infrared">Default</button>
      <button class="neon-btn icon infrared" aria-label="Fire">🔥</button>
    </div>

    <div class="theme-col">
      <span class="theme-name">Arctic</span>
      <button class="neon-btn cta arctic">CTA Arctic</button>
      <button class="neon-btn outline arctic">Outline</button>
      <button class="neon-btn arctic">Default</button>
      <button class="neon-btn icon arctic" aria-label="Ice">❄</button>
    </div>
  </div>

  <!-- ── Disabled States ── -->
  <div class="section">
    <p class="section-label">Disabled States</p>
    <div class="btn-row">
      <button class="neon-btn plasma" disabled>Plasma Off</button>
      <button class="neon-btn acid"   disabled>Acid Off</button>
      <button class="neon-btn infrared" aria-disabled="true">Infrared Off</button>
      <button class="neon-btn arctic"   disabled>Arctic Off</button>
    </div>
  </div>

  <footer>EaseMotion CSS · submissions/examples/animated-neon-buttons</footer>

</body>
</html>
