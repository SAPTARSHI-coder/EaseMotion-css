<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="job-tracker">
        <h1>Job Application Tracker</h1>

        <div class="applications-grid">

            <article class="application-card">
                <h3>Google</h3>
                <span class="status interviewing">Interviewing</span>

                <div class="progress-bar">
                    <div class="progress-fill progress-75"></div>
                </div>

                <p>Technical Interview Scheduled</p>
            </article>

            <article class="application-card">
                <h3>Microsoft</h3>
                <span class="status applied">Applied</span>

                <div class="progress-bar">
                    <div class="progress-fill progress-25"></div>
                </div>

                <p>Application Submitted</p>
            </article>

            <article class="application-card">
                <h3>Amazon</h3>
                <span class="status offer">Offer</span>

                <div class="progress-bar">
                    <div class="progress-fill progress-100"></div>
                </div>

                <p>Offer Received</p>
            </article>

        </div>

        <div class="timeline">
            <h2>Recent Updates</h2>

            <div class="timeline-item">
                <span>Google - Recruiter Call Completed</span>
            </div>

            <div class="timeline-item">
                <span>Microsoft - Application Submitted</span>
            </div>

            <div class="timeline-item">
                <span>Amazon - Offer Letter Received</span>
            </div>
        </div>
    </section>
</body>
</html>
