<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Decoration Break — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;padding:2rem;max-width:700px;width:100%}
    .card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .card h3{font-size:.8rem;text-transform:uppercase;color:#888;margin-bottom:.75rem}
    .highlight{padding:.15em .4em;border-radius:6px;border:2px solid #6c63ff;background:#e8e6ff;line-height:1.8;font-size:1.1rem}
    .card:nth-child(1) .highlight{max-width:220px;display:inline}
    .tag{display:inline-block;margin-top:.75rem;font-family:monospace;font-size:.8rem;color:#666;background:#f0f0f0;padding:.25rem .5rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="grid">
    <div class="card"><h3>Clone</h3><p>This is a <span class="highlight box-decoration-clone">very long highlighted inline text span that wraps across multiple lines</span> to show the clone effect.</p><span class="tag">.box-decoration-clone</span></div>
    <div class="card"><h3>Slice (default)</h3><p>This is a <span class="highlight box-decoration-slice">very long highlighted inline text span that wraps across multiple lines</span> to show the slice effect.</p><span class="tag">.box-decoration-slice</span></div>
  </div>
</body>
</html>
