<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Table Row Scan Highlight</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="table-panel" aria-labelledby="demo-title">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Billing table</p>
          <h1 id="demo-title">Table row scan highlight</h1>
        </div>
        <span class="panel-badge">Keyboard friendly</span>
      </div>

      <div class="table-wrap">
        <table class="scan-table">
          <thead>
            <tr>
              <th>Invoice</th>
              <th>Status</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Due date</th>
            </tr>
          </thead>
          <tbody>
            <tr class="scan-row" tabindex="0">
              <td>#1042</td>
              <td><span class="status paid">Paid</span></td>
              <td>Northline Studio</td>
              <td>$240.00</td>
              <td>Jan 14</td>
            </tr>
            <tr class="scan-row" tabindex="0">
              <td>#1043</td>
              <td><span class="status pending">Pending</span></td>
              <td>Vertex Labs</td>
              <td>$980.00</td>
              <td>Jan 18</td>
            </tr>
            <tr class="scan-row" tabindex="0">
              <td>#1044</td>
              <td><span class="status overdue">Overdue</span></td>
              <td>Bluegrain Co.</td>
              <td>$415.00</td>
              <td>Jan 21</td>
            </tr>
            <tr class="scan-row" tabindex="0">
              <td>#1045</td>
              <td><span class="status paid">Paid</span></td>
              <td>Signal Works</td>
              <td>$720.00</td>
              <td>Jan 28</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
