<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Shimmer Sweep Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-primary-dark:   #4b44cc;
      --ease-color-bg:             #f8fafc;
      --ease-color-surface:        #ffffff;
      --ease-color-text:           #1e293b;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #e2e8f0;
      --ease-radius-md:            0.5rem;
      --ease-radius-lg:            1rem;
      --ease-font-sans:            system-ui, -apple-system, 'Segoe UI', sans-serif;
      --ease-shadow-md:            0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -1px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ease-color-bg:       #0b1121;
        --ease-color-surface:  #141e33;
        --ease-color-text:     #e2e8f0;
        --ease-color-muted:    #94a3b8;
        --ease-color-neutral-200: #334155;
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ease-color-text);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    code {
      background: rgba(108, 99, 255, 0.1);
      color: var(--ease-color-primary);
      padding: 0.1em 0.4em;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
    }

    /* ── Section labels ── */
    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 700px;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ease-color-muted);
    }

    /* ── Demo grid ── */
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      width: 100%;
    }

    /* ── Demo cards ── */
    .demo-card {
      padding: 2.5rem 1.5rem;
      text-align: center;
      border-radius: var(--ease-radius-lg);
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-md);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
    }

    .demo-card span {
      display: block;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--ease-color-muted);
      margin-top: 0.5rem;
    }

    /* Customizing the shimmer for light / dark card states */
    .card-light {
      background: #ffffff;
      color: #1e293b;
      --shimmer-glow: rgba(0, 0, 0, 0.12); /* darker shimmer for white background */
    }

    .card-dark {
      background: #1e1e2f;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.1);
      --shimmer-glow: rgba(255, 255, 255, 0.35); /* lighter shimmer for dark background */
    }

    .card-primary {
      background: var(--ease-color-primary);
      color: #ffffff;
      border-color: var(--ease-color-primary-dark);
      --shimmer-glow: rgba(255, 255, 255, 0.5); /* extra bright shimmer for primary color */
    }

    /* ── Buttons styling ── */
    .btn-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 2rem;
      border: 2px solid transparent;
      border-radius: var(--ease-radius-md);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
    }

    .btn-primary {
      background: var(--ease-color-primary);
      color: #fff;
      border-color: var(--ease-color-primary);
    }

    .btn-secondary {
      background: transparent;
      color: var(--ease-color-primary);
      border-color: var(--ease-color-primary);
      --shimmer-glow: rgba(108, 99, 255, 0.2); /* color-mixed shimmer */
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Hover Shimmer Sweep</h1>
    <p>
      An animation-first, composable visual reflection effect. 
      Hover over the buttons and cards below to witness the diagonal sweep.
    </p>
  </header>

  <!-- Buttons demonstration -->
  <section class="section">
    <span class="section-label">Interactive Buttons</span>
    <div class="btn-container">
      <button class="btn btn-primary shimmer-sweep-uj" aria-label="Primary button with shimmer sweep">
        Primary Button
      </button>
      <button class="btn btn-secondary shimmer-sweep-uj" aria-label="Outline button with custom color shimmer sweep">
        Outline Button
      </button>
    </div>
  </section>

  <!-- Cards demonstration -->
  <section class="section">
    <span class="section-label">Interactive Cards</span>
    <div class="demo-grid">
      <div class="demo-card card-light shimmer-sweep-uj" aria-label="Light card with dark shimmer sweep">
        Light Card
        <span>Dark Shimmer overlay</span>
      </div>
      <div class="demo-card card-dark shimmer-sweep-uj" aria-label="Dark card with bright shimmer sweep">
        Dark Card
        <span>Bright Shimmer overlay</span>
      </div>
      <div class="demo-card card-primary shimmer-sweep-uj" aria-label="Primary color card with bright shimmer sweep">
        Primary Card
        <span>Enhanced white sweep</span>
      </div>
    </div>
  </section>

</body>
</html>
