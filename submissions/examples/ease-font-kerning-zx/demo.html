<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Kerning Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Font Kerning</h1>
    <p class="note">Controls the use of kerning data to space characters.</p>
    <div class="label">kerning-auto (default)</div>
    <div class="demo-kern kerning-auto">AV Wa To Ly</div>
    <div class="label">kerning-normal</div>
    <div class="demo-kern kerning-normal">AV Wa To Ly</div>
    <div class="label">kerning-none</div>
    <div class="demo-kern kerning-none">AV Wa To Ly</div>
  </body>
</html>
