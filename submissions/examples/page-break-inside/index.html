<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Break Inside — EaseMotion CSS</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap");
body { font-family: "Manrope", system-ui, sans-serif; background: #f8fafc; padding: 2.5rem; margin: 0; }
h2 { color: hsl(267,40%,38%); font-size: 17px; margin-bottom: 1.75rem; font-weight: 700; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1.75rem; margin-top: 1rem; }
.card { padding: 2rem; color: white; border-radius: 24px; text-align: center; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
</style>
</head>
<body>
<h2>Page Break Inside — Card Utilities</h2>
<div class="grid">
  <div class="card" style="background:hsl(267,55%,60%)">Page Break Inside Primary</div>
  <div class="card" style="background:hsl(292,50%,52%)">Page Break Inside Secondary</div>
  <div class="card" style="background:linear-gradient(135deg, hsl(267,55%,60%), hsl(292,50%,52%))">Page Break Inside Featured</div>
  <div class="card" style="background:hsl(252,65%,65%)">Page Break Inside Accent</div>
  <div class="card" style="background:transparent;border:2px solid hsl(267,55%,60%);color:hsl(267,55%,60%)">Page Break Inside Ghost</div>
  <div class="card" style="background:hsl(267,55%,60%);opacity:0.82">Page Break Inside Muted</div>
</div>
</body>
</html>
