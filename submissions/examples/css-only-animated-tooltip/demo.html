<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS-Only Animated Tooltip — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 8rem 1rem; margin: 0;">

  <div class="ease-workspace-deck">
    
    <div style="margin-bottom: 2.5rem;">
      <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-weight: 800; font-size: 1.4rem;">Pure CSS Tooltip</h3>
      <p style="margin: 0; color: #64748b; font-size: 0.9rem; line-height: 1.4;">
        Hover over the action below or cycle onto it using your keyboard <strong>[TAB]</strong> key to trigger the custom animated tooltip element.
      </p>
    </div>

    <div class="ease-tooltip-target" data-ease-tooltip="Changes are deployed instantly to production">
      <button class="ease-action-trigger">Push Changes</button>
    </div>

  </div>

</body>
</html>
