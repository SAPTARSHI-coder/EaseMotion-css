<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion Profile Card Flip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="demo-container">

    <div class="ease-profile-card-flip">

        <div class="ease-profile-card">

            <!-- Front -->


            
            <div class="ease-card-front">

                <img src="https://via.placeholder.com/140" alt="Profile">

                <h2>Jane Doe</h2>

                <p>Frontend Developer</p>

            </div>

            <!-- Back -->




            <div class="ease-card-back">

                <h3>Connect</h3>

                <p>Building accessible UI with EaseMotion CSS.</p>

                <div class="social-links">

                    <a href="#">GitHub</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">Portfolio</a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>




</html>
