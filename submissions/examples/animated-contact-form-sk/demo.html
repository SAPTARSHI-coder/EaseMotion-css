<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Contact Form - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-wrapper">
    <h1 class="form-title">Get In Touch</h1>
    <p class="form-subtitle">We'd love to hear from you</p>
    <form class="contact-form">
      <div class="field-group">
        <div class="field">
          <input type="text" id="name" class="field-input" placeholder=" " required>
          <label for="name" class="field-label">Your Name</label>
          <span class="field-indicator"></span>
        </div>
        <div class="field">
          <input type="email" id="email" class="field-input" placeholder=" " required>
          <label for="email" class="field-label">Email Address</label>
          <span class="field-indicator"></span>
        </div>
      </div>
      <div class="field">
        <input type="text" id="subject" class="field-input" placeholder=" " required>
        <label for="subject" class="field-label">Subject</label>
        <span class="field-indicator"></span>
      </div>
      <div class="field">
        <textarea id="message" class="field-input field-textarea" placeholder=" " required rows="5"></textarea>
        <label for="message" class="field-label">Your Message</label>
        <span class="field-indicator"></span>
      </div>
      <div class="field-checkbox">
        <input type="checkbox" id="agree" class="checkbox-input" required>
        <label for="agree" class="checkbox-label">I agree to the privacy policy</label>
      </div>
      <button type="submit" class="submit-btn">
        <span class="submit-text">Send Message</span>
        <span class="submit-icon">→</span>
      </button>
    </form>
  </div>
</body>
</html>
