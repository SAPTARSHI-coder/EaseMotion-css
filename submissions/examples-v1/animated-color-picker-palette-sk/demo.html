<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Color Picker Palette</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="palette">
      <h2>Pick a Color</h2>
      <input type="radio" name="c" id="c1" hidden /><input
        type="radio"
        name="c"
        id="c2"
        hidden
      />
      <input type="radio" name="c" id="c3" hidden /><input
        type="radio"
        name="c"
        id="c4"
        hidden
      />
      <input type="radio" name="c" id="c5" hidden /><input
        type="radio"
        name="c"
        id="c6"
        hidden
      />
      <input type="radio" name="c" id="c7" hidden /><input
        type="radio"
        name="c"
        id="c8"
        hidden
      />
      <input type="radio" name="c" id="c9" hidden /><input
        type="radio"
        name="c"
        id="c10"
        hidden
      />
      <input type="radio" name="c" id="c11" hidden /><input
        type="radio"
        name="c"
        id="c12"
        hidden
      />
      <div class="grid">
        <label for="c1" class="swatch" style="background: #ff6b6b"></label>
        <label for="c2" class="swatch" style="background: #4ecdc4"></label>
        <label for="c3" class="swatch" style="background: #45b7d1"></label>
        <label for="c4" class="swatch" style="background: #96ceb4"></label>
        <label for="c5" class="swatch" style="background: #ffeaa7"></label>
        <label for="c6" class="swatch" style="background: #dda0dd"></label>
        <label for="c7" class="swatch" style="background: #98d8c8"></label>
        <label for="c8" class="swatch" style="background: #f7dc6f"></label>
        <label for="c9" class="swatch" style="background: #bb8fce"></label>
        <label for="c10" class="swatch" style="background: #85c1e9"></label>
        <label for="c11" class="swatch" style="background: #f8c471"></label>
        <label for="c12" class="swatch" style="background: #82e0aa"></label>
      </div>
      <div class="hex-display"></div>
    </div>
  </body>
</html>
