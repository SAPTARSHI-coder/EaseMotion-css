<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCSS @property Easing Demo</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
    width:90%;
    max-width:900px;
}

.card{
    background:#fff;
    padding:30px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    cursor:pointer;
    transition:.4s;
}

.card h3{
    margin-bottom:15px;
}

.card p{
    color:#666;
}

/* Demo classes using mixins after SCSS compilation */

.scale:hover{
    transform:scale(1.08);
}

.rotate:hover{
    transform:rotate(4deg);
}

.lift:hover{
    transform:translateY(-10px);
}

.fade{
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<div class="container">

<div class="card scale fade">
<h3>Scale Hover</h3>
<p>Hover to see smooth scaling using custom easing.</p>
</div>

<div class="card rotate fade">
<h3>Rotate Hover</h3>
<p>Hover to rotate with reusable SCSS mixins.</p>
</div>

<div class="card lift fade">
<h3>Lift Hover</h3>
<p>Hover to lift the card with elegant easing.</p>
</div>

</div>

</body>
</html>
