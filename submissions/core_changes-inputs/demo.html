<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Fields — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 2rem 1rem; background: var(--bg, #fff); color: var(--text, #1a1a2e);">

  <h1>Form Input Fields</h1>
  <p style="color: #666; margin-bottom: 2rem;">Styled text inputs, selects, textareas, checkboxes, and radios — pure CSS.</p>

  <label style="display: flex; align-items: center; gap: .5rem; cursor: pointer; margin-bottom: 2rem;">
    <input type="checkbox" id="darkModeToggle"> Dark mode
  </label>

  <!-- Text inputs -->
  <section style="margin-bottom: 3rem;">
    <h2>Text Inputs</h2>
    <div style="display: flex; flex-direction: column; gap: 1rem;">

      <div class="field">
        <label class="field-label" for="name">Name</label>
        <input class="field-input" id="name" type="text" placeholder="Enter your name">
      </div>

      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" id="email" type="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label class="field-label" for="pw">Password</label>
        <input class="field-input" id="pw" type="password" placeholder="••••••••">
      </div>

      <div class="field">
        <label class="field-label" for="disabled">Disabled</label>
        <input class="field-input" id="disabled" type="text" value="Cannot edit" disabled>
      </div>

      <div class="field">
        <label class="field-label" for="readonly">Read-only</label>
        <input class="field-input" id="readonly" type="text" value="Read only content" readonly>
      </div>

      <div class="field">
        <label class="field-label" for="error">Error state</label>
        <input class="field-input field-error" id="error" type="text" value="Invalid value">
        <span class="field-hint field-hint-error">Please enter a valid value.</span>
      </div>

    </div>
  </section>

  <!-- Textarea -->
  <section style="margin-bottom: 3rem;">
    <h2>Textarea</h2>
    <div class="field">
      <label class="field-label" for="bio">Bio</label>
      <textarea class="field-input field-textarea" id="bio" placeholder="Tell us about yourself..." rows="4"></textarea>
    </div>
  </section>

  <!-- Select -->
  <section style="margin-bottom: 3rem;">
    <h2>Select</h2>
    <div class="field">
      <label class="field-label" for="country">Country</label>
      <select class="field-input field-select" id="country">
        <option value="">Choose a country</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
        <option value="in">India</option>
        <option value="de">Germany</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="country-multi">Multiple Select</label>
      <select class="field-input field-select" id="country-multi" multiple size="3">
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
        <option value="in">India</option>
      </select>
    </div>
  </section>

  <!-- Checkboxes -->
  <section style="margin-bottom: 3rem;">
    <h2>Checkboxes</h2>
    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
      <label class="field-check">
        <input type="checkbox" checked>
        <span class="field-checkmark"></span>
        <span>Accept terms and conditions</span>
      </label>
      <label class="field-check">
        <input type="checkbox">
        <span class="field-checkmark"></span>
        <span>Subscribe to newsletter</span>
      </label>
      <label class="field-check">
        <input type="checkbox" disabled>
        <span class="field-checkmark"></span>
        <span>Disabled option</span>
      </label>
    </div>
  </section>

  <!-- Radios -->
  <section style="margin-bottom: 3rem;">
    <h2>Radio Buttons</h2>
    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
      <label class="field-radio">
        <input type="radio" name="plan" checked>
        <span class="field-radio-dot"></span>
        <span>Free plan</span>
      </label>
      <label class="field-radio">
        <input type="radio" name="plan">
        <span class="field-radio-dot"></span>
        <span>Pro plan</span>
      </label>
      <label class="field-radio">
        <input type="radio" name="plan" disabled>
        <span class="field-radio-dot"></span>
        <span>Enterprise (disabled)</span>
      </label>
    </div>
  </section>

  <!-- Sizes -->
  <section style="margin-bottom: 3rem;">
    <h2>Input Sizes</h2>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <div class="field field-sm">
        <label class="field-label" for="sm">Small</label>
        <input class="field-input" id="sm" type="text" placeholder="Small input">
      </div>
      <div class="field">
        <label class="field-label" for="base">Default</label>
        <input class="field-input" id="base" type="text" placeholder="Default input">
      </div>
      <div class="field field-lg">
        <label class="field-label" for="lg">Large</label>
        <input class="field-input" id="lg" type="text" placeholder="Large input">
      </div>
    </div>
  </section>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      document.body.style.setProperty('--bg', this.checked ? '#1a1a2e' : '#fff');
      document.body.style.setProperty('--text', this.checked ? '#e0e0e0' : '#1a1a2e');
    });
  </script>
</body>
</html>
