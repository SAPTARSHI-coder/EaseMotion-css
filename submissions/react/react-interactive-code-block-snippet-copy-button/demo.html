<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Interactive Code Block Snippet Copy Button Demo</title>
  
  <!-- Load React, ReactDOM and Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Link EaseMotion CSS Core Stylesheets -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/animations.css">
</head>
<body style="background-color: #06090e; margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif;">

  <div id="root" style="width: 100%; max-width: 650px;"></div>

  <!-- Inline Babel Script to Run React Code snippet -->
  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    // --- Interactive React Code Block Component ---
    function CodeSnippetBlock({
      code,
      language = '',
      buttonText = 'Copy',
      copiedText = 'Copied!',
      onCopy,
      className = '',
    }) {
      const [copied, setCopied] = useState(false);
      const timeoutRef = useRef(null);

      const handleCopy = useCallback(async () => {
        if (!code) return;

        try {
          await navigator.clipboard.writeText(code);
          setCopied(true);
          if (onCopy) {
            onCopy();
          }

          if (timeoutRef.current) {
            clearTimeout(timeoutRef.current);
          }
          timeoutRef.current = setTimeout(() => {
            setCopied(false);
          }, 2000);
        } catch (err) {
          console.error('CodeSnippetBlock: Failed to copy to clipboard', err);
        }
      }, [code, onCopy]);

      useEffect(() => {
        return () => {
          if (timeoutRef.current) {
            clearTimeout(timeoutRef.current);
          }
        };
      }, []);

      return (
        <div
          className={`ease-code-block-container ${className}`}
          style={{
            fontFamily: 'var(--ease-font-sans, system-ui, -apple-system, sans-serif)',
            borderRadius: 'var(--ease-radius-lg, 12px)',
            border: '1px solid var(--ease-color-neutral-700, #334155)',
            backgroundColor: 'var(--ease-color-neutral-900, #0f172a)',
            color: 'var(--ease-color-neutral-200, #e2e8f0)',
            overflow: 'hidden',
            boxShadow: 'var(--ease-shadow-lg, 0 10px 15px -3px rgba(0, 0, 0, 0.1))',
            position: 'relative',
            width: '100%',
          }}
        >
          {/* Header Bar */}
          <div
            className="ease-code-block-header"
            style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              padding: 'var(--ease-space-3, 12px) var(--ease-space-4, 16px)',
              backgroundColor: 'rgba(255, 255, 255, 0.02)',
              borderBottom: '1px solid var(--ease-color-neutral-800, #1e293b)',
            }}
          >
            {/* Language Label */}
            <span
              className="ease-code-block-language"
              style={{
                fontFamily: 'var(--ease-font-mono, monospace)',
                fontSize: 'var(--ease-text-xs, 12px)',
                color: 'var(--ease-color-neutral-400, #94a3b8)',
                textTransform: 'uppercase',
                letterSpacing: '1.5px',
                fontWeight: '600',
              }}
            >
              {language || 'code'}
            </span>

            {/* Copy Button */}
            <button
              onClick={handleCopy}
              aria-label={copied ? copiedText : buttonText}
              className={`ease-squish-button ${copied ? 'ease-pulse-border-emphasis' : ''}`}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
                fontFamily: 'var(--ease-font-sans, sans-serif)',
                fontSize: 'var(--ease-text-xs, 12px)',
                fontWeight: '600',
                color: copied ? 'var(--ease-color-success, #22c55e)' : 'var(--ease-color-neutral-300, #cbd5e1)',
                backgroundColor: copied ? 'rgba(34, 197, 94, 0.1)' : 'rgba(255, 255, 255, 0.04)',
                border: `1px solid ${copied ? 'var(--ease-color-success, #22c55e)' : 'var(--ease-color-neutral-700, #334155)'}`,
                borderRadius: 'var(--ease-radius-md, 8px)',
                padding: '6px 14px',
                cursor: 'pointer',
                outline: 'none',
                position: 'relative',
                overflow: 'hidden',
                transition: 'all var(--ease-speed-fast, 150ms) var(--ease-ease, cubic-bezier(0.4, 0, 0.2, 1))',
              }}
            >
              {copied ? (
                <React.Fragment>
                  {/* Checkmark icon */}
                  <svg
                    className="ease-bounce-in"
                    width="13"
                    height="13"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="3.5"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    aria-hidden="true"
                  >
                    <polyline points="20 6 9 17 4 12" />
                  </svg>
                  <span className="ease-zoom-in" aria-live="polite">{copiedText}</span>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  {/* Clipboard icon */}
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2.5"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    aria-hidden="true"
                  >
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                  </svg>
                  <span>{buttonText}</span>
                </React.Fragment>
              )}
            </button>
          </div>

          {/* Pre-formatted code segment */}
          <pre
            style={{
              margin: 0,
              padding: 'var(--ease-space-4, 16px)',
              overflowX: 'auto',
              backgroundColor: 'transparent',
            }}
          >
            <code
              style={{
                fontFamily: 'var(--ease-font-mono, monospace)',
                fontSize: 'var(--ease-text-sm, 14px)',
                lineHeight: 'var(--ease-leading-normal, 1.6)',
                color: 'var(--ease-color-neutral-100, #f1f5f9)',
                whiteSpace: 'pre',
                wordSpacing: 'normal',
                wordBreak: 'normal',
              }}
            >
              {code}
            </code>
          </pre>
        </div>
      );
    }

    // --- Main Demo Sandbox Container ---
    function DemoSandbox() {
      const codeString = `// Step 1: Import CodeSnippetBlock\nimport CodeSnippetBlock from './CodeSnippetBlock';\n\n// Step 2: Use in layout code\nfunction DisplayCode() {\n  return (\n    <CodeSnippetBlock\n      code="npm install easemotion-css"\n      language="bash"\n      buttonText="Copy Install Command"\n    />\n  );\n}`;

      return (
        <div>
          <h2 style={{ color: '#fff', fontSize: '1.5rem', fontWeight: '700', marginBottom: '0.5rem', textAlign: 'center' }}>
            React Interactive Code Block
          </h2>
          <p style={{ color: '#94a3b8', fontSize: '0.875rem', marginBottom: '2rem', textAlign: 'center' }}>
            Copy button features hover-squish button feedback, checkmark bounce-in, and border-glow alerts.
          </p>
          <CodeSnippetBlock 
            code={codeString} 
            language="react / jsx" 
            buttonText="Copy Code Snippet"
            copiedText="Copied Code!"
            onCopy={() => console.log('Successfully copied snippet to clipboard!')}
          />
        </div>
      );
    }

    // Mount and Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DemoSandbox />);
  </script>
</body>
</html>
