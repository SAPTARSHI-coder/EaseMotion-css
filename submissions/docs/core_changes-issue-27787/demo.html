<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-glass-overlay — Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; min-height:100vh; background:linear-gradient(135deg,#667eea,#764ba2,#f093fb); padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:white; text-shadow:0 2px 10px rgba(0,0,0,0.3); }
.demo-header p { color:rgba(255,255,255,0.8); margin-top:0.5rem; }
.demo-section { max-width:600px; margin:0 auto 2.5rem; text-align:center; }
.demo-section h2 { font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.9);margin-bottom:0.75rem; }
.grid { display:flex; gap:2rem; justify-content:center; flex-wrap:wrap; }
.glass-card { padding:2rem; text-align:center; border-radius:0.75rem; min-width:200px; }
.glass-card h3 { color:white; margin-bottom:0.5rem; }
.glass-card p { color:rgba(255,255,255,0.8); font-size:0.85rem; }
.light { background:rgba(255,255,255,0.15); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.2); }
.dark { background:rgba(0,0,0,0.25); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); }
.tag { display:inline-block; font-size:0.6rem; font-family:monospace; background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3); border-radius:999px; padding:0.25em 0.75em; color:white; margin-top:0.75rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-glass-overlay</h1><p>Glassmorphism overlay mixins</p></header>
<section class="demo-section">
<h2>Overlay Variants</h2>
<div class="grid">
<div class="glass-card light"><h3>Light Glass</h3><p>White frosted overlay</p><div class="tag">ease-glass-overlay</div></div>
<div class="glass-card dark"><h3>Dark Glass</h3><p>Dark frosted overlay</p><div class="tag">ease-glass-overlay-dark</div></div>
</div>
</section>
</body>
</html>
