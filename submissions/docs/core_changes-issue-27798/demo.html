<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-button-ripple — Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; color:#1e293b; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; color:#f1f5f9; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.demo-section { max-width:400px; margin:0 auto 2.5rem; text-align:center; }
.demo-section h2 { font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6c63ff;margin-bottom:0.75rem; }
.btn { position:relative; overflow:hidden; cursor:pointer; padding:0.75rem 2rem; border:none; border-radius:0.5rem; font-size:0.9rem; font-weight:500; background:#6c63ff; color:white; }
.btn::after { content:''; position:absolute; inset:0; background:radial-gradient(circle at center,rgba(255,255,255,0.4) 0%,transparent 60%); opacity:0; transition:opacity 0.6s ease; pointer-events:none; }
.btn:hover::after { opacity:1; }
.btn:active::after { opacity:0.6; transition:opacity 0s; }
.tag { display:inline-block; font-size:0.6rem; font-family:monospace; background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.2); border-radius:999px; padding:0.25em 0.75em; color:#6c63ff; margin-top:1rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-button-ripple</h1><p>Micro-interaction ripple effect mixins</p></header>
<section class="demo-section">
<h2>Demo</h2>
<button class="btn">Hover / Click me</button>
<div class="tag" style="margin-top:1rem;">ease-ripple-base + ease-ripple-effect</div>
</section>
</body>
</html>
