<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix: Progress Track Dark Mode Adaptation</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    h1 { font-size: 1.5rem; }
    p { color: var(--ease-color-muted); max-width: 520px; text-align: center; }
    .demo-container {
      width: 90%;
      max-width: 450px;
      padding: 2rem;
      border: 1px solid var(--ease-color-neutral-200);
      border-radius: var(--ease-radius-lg);
      background: var(--ease-color-surface);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .demo-theme-toggle {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>Fix: Progress Track Dark Mode Adaptation</h1>
  <p>The progress track background now uses CSS custom properties that adapt to dark mode. Toggle dark mode to verify.</p>

  <div class="demo-theme-toggle">
    <button class="ease-btn ease-btn-sm ease-btn-outline" onclick="document.documentElement.setAttribute('data-theme','light')">☀️ Light</button>
    <button class="ease-btn ease-btn-sm ease-btn-outline" onclick="document.documentElement.setAttribute('data-theme','dark')">🌙 Dark</button>
  </div>

  <div class="demo-container">
    <div class="ease-field">
      <label class="ease-field-label">Theme-Aware Progress Bar (Demo)</label>
      <div class="demo-progress">
        <div class="demo-progress-bar" style="width: 50%;"></div>
      </div>
    </div>
  </div>
</body>
</html>
