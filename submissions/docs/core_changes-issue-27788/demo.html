<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-color-palette — Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; color:#1e293b; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; color:#f1f5f9; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.demo-section { max-width:600px; margin:0 auto 2.5rem; text-align:center; }
.demo-section h2 { font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6c63ff;margin-bottom:0.75rem; }
.grid { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
.swatch { width:80px; height:80px; border-radius:0.5rem; display:flex; align-items:center; justify-content:center; font-size:0.6rem; color:white; font-weight:500; }
.tag { display:inline-block; font-size:0.6rem; font-family:monospace; background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.2); border-radius:999px; padding:0.25em 0.75em; color:#6c63ff; margin-top:1rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-color-palette</h1><p>Dynamic tint & shade color functions</p></header>
<section class="demo-section">
<h2>Tint Scale (Base: #6c63ff)</h2>
<div class="grid">
<div class="swatch" style="background:#6c63ff;">Base</div>
<div class="swatch" style="background:#8b85ff;">+15%</div>
<div class="swatch" style="background:#aba6ff;">+30%</div>
<div class="swatch" style="background:#cbc8ff;">+45%</div>
<div class="swatch" style="background:#ebebff;">+60%</div>
</div>
<h2 style="margin-top:1.5rem;">Shade Scale</h2>
<div class="grid">
<div class="swatch" style="background:#6c63ff;">Base</div>
<div class="swatch" style="background:#5c54d9;">-15%</div>
<div class="swatch" style="background:#4b45b2;">-30%</div>
<div class="swatch" style="background:#3a358c;">-45%</div>
<div class="swatch" style="background:#292665;">-60%</div>
</div>
<div class="tag">ease-tint / ease-shade SCSS functions</div>
</section>
</body>
</html>
