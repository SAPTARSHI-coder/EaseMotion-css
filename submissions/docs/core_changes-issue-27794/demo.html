<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-flexbox — Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; color:#1e293b; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; color:#f1f5f9; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.demo-section { max-width:600px; margin:0 auto 2.5rem; width:100%; }
.demo-section h2 { font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#6c63ff;margin-bottom:0.75rem; }
.flex-demo { background:white; border:1px solid #e2e8f0; border-radius:0.5rem; padding:1rem; margin-bottom:1rem; }
@media (prefers-color-scheme:dark) { .flex-demo { background:#1e293b; border-color:#334155; } }
.flex-demo > div { padding:0.5rem 0.75rem; background:#6c63ff; color:white; border-radius:0.25rem; font-size:0.75rem; }
.tag { display:inline-block; font-size:0.6rem; font-family:monospace; background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.2); border-radius:999px; padding:0.25em 0.75em; color:#6c63ff; margin-left:1rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-flexbox</h1><p>Flexbox alignment & layout mixins</p></header>
<section class="demo-section">
<h2>Layout Patterns</h2>
<div class="flex-demo" style="display:flex;align-items:center;justify-content:space-between;"><div>Item A</div><div>Item B</div><div>Item C</div><span class="tag">ease-flex-between</span></div>
<div class="flex-demo" style="display:flex;align-items:center;justify-content:center;gap:0.75rem;"><div>Center 1</div><div>Center 2</div><div>Center 3</div><span class="tag">ease-flex-center</span></div>
<div class="flex-demo" style="display:flex;flex-direction:column;gap:0.5rem;"><div>Top</div><div>Middle</div><div>Bottom</div><span class="tag">ease-flex-column</span></div>
<div class="flex-demo" style="display:flex;flex-wrap:wrap;gap:0.5rem;"><div>Wrap 1</div><div>Wrap 2</div><div>Wrap 3</div><div>Wrap 4</div><div>Wrap 5</div><span class="tag">ease-flex-wrap</span></div>
</section>
</body>
</html>
