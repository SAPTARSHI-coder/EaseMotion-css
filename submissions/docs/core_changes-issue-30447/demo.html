<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Floating Input — EaseMotion CSS</title><link rel="stylesheet" href="style.css"><style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 0 auto; padding: 2rem; background: #f9fafb; color: #111; }
h1 { margin-bottom: 1.5rem; }
section { background: #fff; padding: 1.5rem; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
h2 { margin: 0 0 1rem; font-size: 1rem; color: #374151; }
code { background: #e5e7eb; padding: .15em .4em; border-radius: 4px; }
.form-group { margin-bottom: 1.25rem; }
</style></head>
<body>
<h1>Floating Label Input</h1>
<section>
<h2>Text Inputs</h2>
<div class="ease-floating-input form-group">
  <input type="text" id="name" placeholder="Full Name">
  <label class="ease-floating-label" for="name">Full Name</label>
</div>
<div class="ease-floating-input form-group">
  <input type="email" id="email" placeholder="Email Address">
  <label class="ease-floating-label" for="email">Email Address</label>
</div>
<div class="ease-floating-input form-group">
  <input type="password" id="pass" placeholder="Password" value="secret">
  <label class="ease-floating-label" for="pass">Password</label>
</div>
</section>
<section>
<h2>Textarea</h2>
<div class="ease-floating-input form-group">
  <textarea id="bio" placeholder="Tell us about yourself"></textarea>
  <label class="ease-floating-label" for="bio">Biography</label>
</div>
</section>
<section>
<h2>Error & Success States</h2>
<div class="ease-floating-input ease-floating-input-error form-group">
  <input type="text" id="err" placeholder="Invalid field" value="bad">
  <label class="ease-floating-label" for="err">Error State</label>
</div>
<div class="ease-floating-input ease-floating-input-success form-group">
  <input type="text" id="ok" placeholder="Valid field" value="good">
  <label class="ease-floating-label" for="ok">Success State</label>
</div>
</section>
</body>
</html>
