<div class="playground-root">
  <h3>Animation Playground</h3>
  <div id="box" class="animated-box">Target</div>
  <div class="controls">
    <button onclick="updateAnim('animate-fade')">Fade</button>
    <button onclick="updateAnim('animate-bounce')">Bounce</button>
    <button onclick="updateAnim('animate-spin')">Spin</button>
  </div>
</div>

<script>
function updateAnim(className) {
  const box = document.getElementById('box');
  box.className = 'animated-box ' + className;
}
</script>
