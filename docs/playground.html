<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS — Animation Playground</title>
    <meta
      name="description"
      content="Interactive animation playground for EaseMotion CSS. Combine animation type, duration, delay, and easing in real time."
    />
    <!-- Favicon and App Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="manifest" href="assets/site.webmanifest" />
    <link rel="shortcut icon" href="assets/favicon.ico" />

    <link rel="stylesheet" href="easemotion.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="docs.css" />

    <!-- Apply stored theme before first paint to avoid flash -->
    <script>
      (function () {
        var t = localStorage.getItem("em-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>

    <style>
      /* ─── Playground page-specific styles ─────────────────────────── */
      .pg-wrapper {
        max-width: 960px;
        margin: 2.5rem auto;
        padding: 0 1.5rem 4rem;
      }

      .pg-hero {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .pg-hero h1 {
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .pg-hero p {
        opacity: 0.7;
        font-size: 1.05rem;
      }

      .pg-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        align-items: start;
      }

      @media (max-width: 680px) {
        .pg-layout {
          grid-template-columns: 1fr;
        }
      }

      /* Controls panel */
      .pg-controls {
        background: var(--ease-color-surface, #1e293b);
        border: 1px solid var(--ease-color-border, #334155);
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      .pg-controls h2 {
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.6;
        margin-bottom: 0.25rem;
      }

      .pg-field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .pg-field label {
        font-size: 0.85rem;
        font-weight: 600;
        opacity: 0.8;
      }

      .pg-field select,
      .pg-field input[type="range"] {
        width: 100%;
        accent-color: var(--ease-color-primary, #6c63ff);
        border-radius: 6px;
        border: 1px solid var(--ease-color-border, #334155);
        background: var(--ease-color-bg, #0f172a);
        color: inherit;
        padding: 0.45rem 0.65rem;
        font-size: 0.9rem;
        cursor: pointer;
      }

      .pg-field input[type="range"] {
        padding: 0;
        border: none;
        height: 6px;
        margin-top: 0.25rem;
      }

      .pg-field .range-value {
        font-size: 0.82rem;
        opacity: 0.65;
        text-align: right;
      }

      .pg-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .pg-btn {
        flex: 1;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        border: none;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
      }

      .pg-btn:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }

      .pg-btn:active {
        transform: translateY(0);
      }

      .pg-btn-primary {
        background: var(--ease-color-primary, #6c63ff);
        color: #fff;
      }

      .pg-btn-secondary {
        background: var(--ease-color-surface, #1e293b);
        border: 1px solid var(--ease-color-border, #334155);
        color: inherit;
      }

      /* Preview panel */
      .pg-preview {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      .pg-stage {
        min-height: 260px;
        background: var(--ease-color-surface, #1e293b);
        border: 1px solid var(--ease-color-border, #334155);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .pg-stage-label {
        position: absolute;
        top: 0.75rem;
        left: 0.9rem;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        opacity: 0.35;
        font-weight: 600;
      }

      #pg-preview-box {
        width: 110px;
        height: 110px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--ease-color-primary, #6c63ff), #e040fb);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        box-shadow: 0 8px 32px rgba(108, 99, 255, 0.35);
      }

      /* Classes output */
      .pg-classes {
        background: var(--ease-color-surface, #1e293b);
        border: 1px solid var(--ease-color-border, #334155);
        border-radius: 12px;
        padding: 1rem 1.25rem;
      }

      .pg-classes-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.55;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      #pg-class-output {
        font-family: monospace;
        font-size: 0.9rem;
        word-break: break-all;
        color: var(--ease-color-primary, #6c63ff);
        min-height: 1.4em;
      }

      .pg-copy-feedback {
        font-size: 0.78rem;
        opacity: 0;
        color: #4ade80;
        transition: opacity 0.3s;
        margin-top: 0.3rem;
      }

      .pg-copy-feedback.show {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <!-- ── Header ────────────────────────────────────────────── -->
    <header class="docs-header">
      <a href="index.html" class="docs-logo">
        <img src="assets/logo.svg" alt="EaseMotion CSS" class="docs-logo-img" />
      </a>
      <ul class="docs-header-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="animations-preview.html">Animation Preview</a></li>
        <li>
          <a href="animation-combo.html" class="ease-btn ease-nav-button">Animation Builder</a>
        </li>
        <li>
          <a href="playground.html" class="ease-btn ease-nav-button active">Playground</a>
        </li>
      </ul>
      <button
        id="theme-toggle"
        class="theme-toggle-btn"
        aria-label="Toggle dark/light theme"
        title="Toggle theme"
      >
        <svg
          class="sun-icon"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.72" x2="5.64" y2="18.3"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg
          class="moon-icon"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </header>

    <!-- ── Main content ──────────────────────────────────────── -->
    <main>
      <div class="pg-wrapper">
        <div class="pg-hero">
          <h1>Animation Playground</h1>
          <p>
            Select an animation type, adjust duration, delay, and easing — then replay and copy
            the classes.
          </p>
        </div>

        <div class="pg-layout">
          <!-- Controls -->
          <div class="pg-controls">
            <h2>Controls</h2>

            <!-- Animation type -->
            <div class="pg-field">
              <label for="pg-animation">Animation Type</label>
              <select id="pg-animation">
                <optgroup label="Fade">
                  <option value="ease-fade-in">Fade In</option>
                  <option value="ease-fade-out">Fade Out</option>
                  <option value="ease-fade-in-up">Fade In Up</option>
                  <option value="ease-fade-in-down">Fade In Down</option>
                  <option value="ease-fade-in-left">Fade In Left</option>
                  <option value="ease-fade-in-right">Fade In Right</option>
                </optgroup>
                <optgroup label="Slide">
                  <option value="ease-slide-up">Slide Up</option>
                  <option value="ease-slide-down">Slide Down</option>
                  <option value="ease-slide-left">Slide Left</option>
                  <option value="ease-slide-right">Slide Right</option>
                </optgroup>
                <optgroup label="Zoom">
                  <option value="ease-zoom-in">Zoom In</option>
                  <option value="ease-zoom-out">Zoom Out</option>
                </optgroup>
                <optgroup label="Bounce">
                  <option value="ease-bounce-in">Bounce In</option>
                  <option value="ease-bounce-in-up">Bounce In Up</option>
                </optgroup>
                <optgroup label="Rotate">
                  <option value="ease-rotate-in">Rotate In</option>
                  <option value="ease-rotate-out">Rotate Out</option>
                </optgroup>
                <optgroup label="Hover">
                  <option value="ease-hover-grow">Hover Grow</option>
                  <option value="ease-hover-float">Hover Float</option>
                  <option value="ease-hover-glow">Hover Glow</option>
                </optgroup>
              </select>
            </div>

            <!-- Duration -->
            <div class="pg-field">
              <label for="pg-duration">Duration</label>
              <input
                type="range"
                id="pg-duration"
                min="100"
                max="3000"
                step="100"
                value="600"
              />
              <span class="range-value" id="pg-duration-val">600ms</span>
            </div>

            <!-- Delay -->
            <div class="pg-field">
              <label for="pg-delay">Delay</label>
              <input
                type="range"
                id="pg-delay"
                min="0"
                max="1000"
                step="50"
                value="0"
              />
              <span class="range-value" id="pg-delay-val">0ms</span>
            </div>

            <!-- Easing -->
            <div class="pg-field">
              <label for="pg-easing">Easing</label>
              <select id="pg-easing">
                <option value="ease">ease (default)</option>
                <option value="ease-in">ease-in</option>
                <option value="ease-out">ease-out</option>
                <option value="ease-in-out">ease-in-out</option>
                <option value="linear">linear</option>
                <option value="cubic-bezier(0.34,1.56,0.64,1)">spring (overshoot)</option>
                <option value="cubic-bezier(0.68,-0.55,0.27,1.55)">back-in-out</option>
              </select>
            </div>

            <!-- Actions -->
            <div class="pg-actions">
              <button class="pg-btn pg-btn-primary" id="pg-replay-btn" type="button">
                ▶ Replay
              </button>
              <button class="pg-btn pg-btn-secondary" id="pg-copy-btn" type="button">
                Copy Classes
              </button>
              <button class="pg-btn pg-btn-secondary" id="pg-reset-btn" type="button">
                Reset
              </button>
            </div>
          </div>

          <!-- Preview -->
          <div class="pg-preview">
            <div class="pg-stage" id="pg-stage">
              <span class="pg-stage-label">Preview</span>
              <div id="pg-preview-box" role="img" aria-label="Animation preview element">
                ✦
              </div>
            </div>

            <!-- Generated classes -->
            <div class="pg-classes">
              <div class="pg-classes-label">Generated Classes</div>
              <div id="pg-class-output" aria-live="polite" aria-label="Generated CSS class string"></div>
              <div class="pg-copy-feedback" id="pg-copy-feedback">✓ Copied to clipboard!</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      // ── Playground logic ────────────────────────────────────────────

      const DEFAULTS = {
        animation: "ease-fade-in",
        duration: 600,
        delay: 0,
        easing: "ease",
      };

      const selAnimation = document.getElementById("pg-animation");
      const ranDuration = document.getElementById("pg-duration");
      const spanDuration = document.getElementById("pg-duration-val");
      const ranDelay = document.getElementById("pg-delay");
      const spanDelay = document.getElementById("pg-delay-val");
      const selEasing = document.getElementById("pg-easing");
      const previewBox = document.getElementById("pg-preview-box");
      const classOutput = document.getElementById("pg-class-output");
      const copyFeedback = document.getElementById("pg-copy-feedback");
      const btnReplay = document.getElementById("pg-replay-btn");
      const btnCopy = document.getElementById("pg-copy-btn");
      const btnReset = document.getElementById("pg-reset-btn");

      /** Map speed tokens to approximate ms values for display reference */
      const SPEED_TOKENS = {
        fast: 300,
        medium: 600,
        slow: 900,
      };

      /** Build the class string and inline style for the preview */
      function buildConfig() {
        const anim = selAnimation.value;
        const dur = Number(ranDuration.value);
        const delay = Number(ranDelay.value);
        const easing = selEasing.value;

        // Choose EaseMotion speed modifier class
        let speedClass = "ease-speed-medium";
        if (dur <= 300) speedClass = "ease-speed-fast";
        else if (dur >= 900) speedClass = "ease-speed-slow";

        const classes = [anim, speedClass].filter(Boolean).join(" ");
        const style = {
          animationDuration: dur + "ms",
          animationDelay: delay + "ms",
          animationTimingFunction: easing,
          animationFillMode: "both",
        };

        return { classes, style };
      }

      function updateOutput() {
        const { classes } = buildConfig();
        classOutput.textContent = classes;
      }

      function replay() {
        const { classes, style } = buildConfig();

        // Remove all animation classes & reset inline style
        previewBox.className = "";
        previewBox.removeAttribute("style");
        previewBox.style.cssText = "";

        // Force reflow so the browser registers the class removal
        void previewBox.offsetWidth;

        // Re-apply base styles
        previewBox.id = "pg-preview-box";
        Object.assign(previewBox.style, style);

        // Add animation class(es)
        classes.split(" ").forEach((c) => {
          if (c) previewBox.classList.add(c);
        });

        updateOutput();
      }

      function copyClasses() {
        const text = classOutput.textContent;
        navigator.clipboard
          .writeText(text)
          .then(() => {
            copyFeedback.classList.add("show");
            setTimeout(() => copyFeedback.classList.remove("show"), 2000);
          })
          .catch(() => {
            // Fallback for browsers without clipboard API
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            copyFeedback.classList.add("show");
            setTimeout(() => copyFeedback.classList.remove("show"), 2000);
          });
      }

      function resetDefaults() {
        selAnimation.value = DEFAULTS.animation;
        ranDuration.value = DEFAULTS.duration;
        ranDelay.value = DEFAULTS.delay;
        selEasing.value = DEFAULTS.easing;
        spanDuration.textContent = DEFAULTS.duration + "ms";
        spanDelay.textContent = DEFAULTS.delay + "ms";
        replay();
      }

      // ── Event listeners ──────────────────────────────────────────────
      ranDuration.addEventListener("input", () => {
        spanDuration.textContent = ranDuration.value + "ms";
        replay();
      });

      ranDelay.addEventListener("input", () => {
        spanDelay.textContent = ranDelay.value + "ms";
        replay();
      });

      selAnimation.addEventListener("change", replay);
      selEasing.addEventListener("change", replay);
      btnReplay.addEventListener("click", replay);
      btnCopy.addEventListener("click", copyClasses);
      btnReset.addEventListener("click", resetDefaults);

      // ── Theme toggle (same pattern as animation-combo.html) ──────────
      const themeToggleBtn = document.getElementById("theme-toggle");
      if (themeToggleBtn) {
        themeToggleBtn.addEventListener("click", () => {
          const current = document.documentElement.getAttribute("data-theme");
          const next = current === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("em-theme", next);
        });
      }

      // ── Init ─────────────────────────────────────────────────────────
      replay();
    </script>
  </body>
</html>
